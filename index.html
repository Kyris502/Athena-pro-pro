// ── ORDER FLOW CHART COMPONENT ─────────────────────────────────────────────
function OrderFlowChart({candles, pair, tf, livePrice}) {
  const canvasRef = useRef(null);
  const [stats, setStats] = useState(null);

  const data = useMemo(() => {
    if (!candles || candles.length === 0) return [];
    const rand = seededRand(pair.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*17);
    return candles.map(c => {
      const range = c.high - c.low || 0.0001;
      const body  = Math.abs(c.close - c.open);
      const bull  = c.close >= c.open;
      // Estimate buy/sell volume from candle anatomy
      const totalVol = Math.round((range / (BASE_PRICES[pair]||1)) * 50000 + rand()*20000 + 5000);
      const bodyRatio = Math.min(body / range, 0.95);
      const buyVol  = bull
        ? Math.round(totalVol * (0.5 + bodyRatio*0.4 + rand()*0.1))
        : Math.round(totalVol * (0.5 - bodyRatio*0.4 + rand()*0.1));
      const sellVol = totalVol - buyVol;
      const delta   = buyVol - sellVol;
      return { ...c, buyVol, sellVol, totalVol, delta, bull };
    });
  }, [candles, pair]);

  // Volume profile
  const volProfile = useMemo(() => {
    if (!data.length) return { bins:[], poc:0, vah:0, val:0 };
    const lo  = Math.min(...data.map(d=>d.low));
    const hi  = Math.max(...data.map(d=>d.high));
    const bins = 30;
    const step = (hi - lo) / bins;
    const profile = Array.from({length:bins}, (_,i) => ({
      price: lo + (i+0.5)*step,
      vol: 0,
    }));
    data.forEach(d => {
      const iLo = Math.floor((d.low  - lo) / step);
      const iHi = Math.floor((d.high - lo) / step);
      for (let i = Math.max(0,iLo); i <= Math.min(bins-1,iHi); i++) {
        profile[i].vol += d.totalVol / Math.max(1, iHi-iLo+1);
      }
    });
    const poc = profile.reduce((a,b)=>a.vol>b.vol?a:b).price;
    const totalVol = profile.reduce((a,b)=>a+b.vol,0);
    let cumVol = 0;
    const sorted = [...profile].sort((a,b)=>b.vol-a.vol);
    const va = new Set();
    for (const b of sorted) {
      va.add(b.price);
      cumVol += b.vol;
      if (cumVol >= totalVol * 0.7) break;
    }
    const vaPrices = [...va].sort((a,b)=>a-b);
    return { bins: profile, poc, vah: vaPrices[vaPrices.length-1]||hi, val: vaPrices[0]||lo };
  }, [data]);

  // Compute stats
  useEffect(() => {
    if (!data.length) return;
    const buyCand  = data.filter(d=>d.delta>0).length;
    const sellCand = data.filter(d=>d.delta<0).length;
    const threshold = data.reduce((a,d)=>a+Math.abs(d.delta),0)/data.length * 1.5;
    const strongBuy  = data.filter(d=>d.delta>threshold).length;
    const strongSell = data.filter(d=>d.delta<-threshold).length;
    const dec = pair.includes('JPY')||['BTC/USD','ETH/USD','XAU/USD','US500','NAS100','GER40'].includes(pair)?2:5;
    setStats({ buyCand, sellCand, strongBuy, strongSell,
      vah: volProfile.vah.toFixed(dec), val: volProfile.val.toFixed(dec),
      poc: volProfile.poc.toFixed(dec) });
  }, [data, volProfile]);

  // Canvas draw
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !data.length) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width = canvas.offsetWidth;
    const H = canvas.height = canvas.offsetHeight;

    ctx.fillStyle = '#0b0e1a';
    ctx.fillRect(0,0,W,H);

    const PROF_W = 80;
    const CHART_W = W - PROF_W - 60;
    const DELTA_H = Math.floor(H * 0.22);
    const MAIN_H  = H - DELTA_H - 20;
    const N = Math.min(data.length, Math.floor(CHART_W / 6));
    const slice = data.slice(data.length - N);

    const lo   = Math.min(...slice.map(d=>d.low));
    const hi   = Math.max(...slice.map(d=>d.high));
    const rng  = hi - lo || 1;
    const barW = Math.max(2, (CHART_W / N) - 1);
    const maxDelta = Math.max(...slice.map(d=>Math.abs(d.delta)));

    const priceToY = p => MAIN_H - ((p-lo)/rng)*MAIN_H + 10;

    // Grid
    ctx.strokeStyle='rgba(26,34,56,.4)'; ctx.lineWidth=1;
    for (let i=0;i<5;i++) {
      const y = 10 + (MAIN_H/4)*i;
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CHART_W,y); ctx.stroke();
    }

    // POC line
    const pocY = priceToY(volProfile.poc);
    ctx.strokeStyle='#f59e0b'; ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(0,pocY); ctx.lineTo(CHART_W,pocY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#f59e0b'; ctx.font='bold 9px Inter';
    ctx.fillText('POC',CHART_W+4,pocY+3);

    // VAH/VAL
    [volProfile.vah, volProfile.val].forEach((p,i)=>{
      const y = priceToY(p);
      ctx.strokeStyle=i===0?'rgba(16,185,129,.5)':'rgba(239,68,68,.5)'; ctx.lineWidth=1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CHART_W,y); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle=i===0?'#10b981':'#ef4444';
      ctx.fillText(i===0?'VAH':'VAL',CHART_W+4,y+3);
    });

    // Candles
    slice.forEach((d,i) => {
      const x = 30 + i * (CHART_W/N);
      const openY  = priceToY(d.open);
      const closeY = priceToY(d.close);
      const highY  = priceToY(d.high);
      const lowY   = priceToY(d.low);
      const col = d.bull ? '#2962FF' : '#ef4444';

      ctx.strokeStyle=col; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(x+barW/2,highY); ctx.lineTo(x+barW/2,lowY); ctx.stroke();
      ctx.fillStyle=col;
      const top=Math.min(openY,closeY), bodyH=Math.max(Math.abs(closeY-openY),1);
      ctx.fillRect(x, top, barW, bodyH);

      // Delta mini-bar
      const dH = maxDelta>0 ? (Math.abs(d.delta)/maxDelta)*(DELTA_H-6) : 2;
      const dY = MAIN_H + DELTA_H - dH - 4;
      const dCol = d.delta>0 ? 'rgba(16,185,129,.8)' : 'rgba(239,68,68,.8)';
      ctx.fillStyle=dCol;
      ctx.fillRect(x, dY, barW, dH);

      // Delta value label (every 5th)
      if (i%5===0 && barW>4) {
        ctx.fillStyle='rgba(255,255,255,.35)'; ctx.font='7px Inter';
        const label = d.delta>0?'+'+Math.round(d.delta/1000)+'K':Math.round(d.delta/1000)+'K';
        ctx.fillText(label, x, MAIN_H+DELTA_H+14);
      }
    });

    // Volume profile bars
    const maxVol = Math.max(...volProfile.bins.map(b=>b.vol));
    volProfile.bins.forEach(b => {
      const y = priceToY(b.price) - 4;
      const bw = Math.max(2, (b.vol/maxVol)*PROF_W);
      const isPOC = Math.abs(b.price-volProfile.poc)<(hi-lo)/30;
      ctx.fillStyle = isPOC ? '#f59e0b' :
        b.price>volProfile.poc ? 'rgba(16,185,129,.45)' : 'rgba(59,130,246,.45)';

// ── MARKET HOURS ──────────────────────────────────────────────────────────
function isForexOpen() {
  const now = new Date();
  const day = now.getUTCDay();   // 0=Sun, 1=Mon, ... 5=Fri, 6=Sat
  const h   = now.getUTCHours();
  const m   = now.getUTCMinutes();
  const t   = h * 60 + m;
  if (day === 6) return false;                    // Saturday: always closed
  if (day === 0 && t < 22 * 60) return false;    // Sunday before 22:00 UTC: closed
  if (day === 5 && t >= 22 * 60) return false;   // Friday after 22:00 UTC: closed
  return true;
}

function getMarketStatus() {
  const open = isForexOpen();
  const now  = new Date();
  const day  = now.getUTCDay();
  const h    = now.getUTCHours();
  const m    = now.getUTCMinutes();
  const t    = h * 60 + m;
  if (open) return { open: true, label: 'MARKET OPEN', color: '#10b981' };
  // Calculate time until open
  let minsUntil = 0;
  if (day === 6) {
    minsUntil = (24 - h) * 60 - m + 22 * 60; // Saturday → Sunday 22:00
  } else if (day === 0) {
    minsUntil = 22 * 60 - t; // Sunday → 22:00 UTC today
  } else {
    // Friday after close
    minsUntil = (24 - h) * 60 - m + 22 * 60; // → Saturday → Sunday 22:00
    minsUntil += 24 * 60;
  }
  const hh = Math.floor(minsUntil / 60);
  const mm = minsUntil % 60;
  return { open: false, label: `MARKET CLOSED · Opens in ${hh}h ${String(mm).padStart(2,'0')}m`, color: '#ef4444' };
}

const tfCat=tf=>['30m','1H'].includes(tf)?'s':['2H','4H'].includes(tf)?'m':'l';
const fmtSecs=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;};
const confLabel=p=>p>=80?{label:'STRONG',c:'#3b82f6'}:p>=60?{label:'MODERATE',c:'#3b82f6'}:p>=40?{label:'FAIR',c:'#f59e0b'}:p>=20?{label:'WEAK',c:'#ef4444'}:{label:'NONE',c:'#4a5a7a'};

function getSessions(){
  const now=new Date();const h=now.getUTCHours()+now.getUTCMinutes()/60;
  return SESSIONS.map(s=>{
    const act=s.e<s.s?(h>=s.s||h<s.e):(h>=s.s&&h<s.e);
    let rem=0;
    if(act){let e=s.e<=s.s?s.e+24:s.e;let c=h<s.s?h+24:h;rem=(e-c)*3600;}
    const totalSecs=(s.e<=s.s?((24-s.s)+s.e):(s.e-s.s))*3600;
    const elapsed=totalSecs-rem;
    return {...s,active:act,remaining:Math.max(0,rem),pct:Math.min(100,(elapsed/totalSecs)*100)};
  });
}

function calcLots(bal,rPct,entry,sl,pair){
  const cfg=PIP_CFG[pair]||{pip:0.0001,pv:10};
  if(!bal||!rPct||!entry||!sl)return 0;
  const risk=parseFloat(bal)*(parseFloat(rPct)/100);
  const pips=Math.abs(parseFloat(entry)-parseFloat(sl))/cfg.pip;
  return pips?risk/(pips*cfg.pv):0;
}


// ── PATTERN DETECTION ENGINE ───────────────────────────────────────────────

function findPivots(candles, lookback=3) {
  const highs=[], lows=[];
  for(let i=lookback; i<candles.length-lookback; i++){
    const hi=Math.max(...candles.slice(i-lookback,i+lookback+1).map(c=>c.high));
    const lo=Math.min(...candles.slice(i-lookback,i+lookback+1).map(c=>c.low));
    if(candles[i].high===hi) highs.push({i,price:candles[i].high,time:candles[i].time});
    if(candles[i].low ===lo) lows.push({i,price:candles[i].low, time:candles[i].time});
  }
  return {highs, lows};
}

function detectPatterns(candles) {
  if(candles.length<30) return [];
  const patterns=[];
  const recent=candles.slice(-80);
  const {highs,lows}=findPivots(recent,3);
  const last=recent[recent.length-1];
  const priceRange=Math.max(...recent.map(c=>c.high))-Math.min(...recent.map(c=>c.low));
  const tol=priceRange*0.015; // 1.5% tolerance

  // ── HEAD & SHOULDERS (Bearish) ──
  if(highs.length>=3){
    const rH=highs.slice(-3);
    const [lS,head,rS]=rH;
    if(head && head.price>lS.price && head.price>rS.price &&
       Math.abs(lS.price-rS.price)<tol*2 &&
       head.price-lS.price>tol){
      // Find neckline lows between shoulders
      const neckLows=lows.filter(l=>l.i>lS.i&&l.i<rS.i);
      const neckline=neckLows.length>0?neckLows.reduce((a,b)=>a.price<b.price?a:b).price:lS.price-tol;
      const height=head.price-neckline;
      patterns.push({
        type:'Head & Shoulders', dir:'bearish',
        points:[lS,head,rS], neckline,
        entry:neckline, sl:rS.price+tol, tp:neckline-height,
        confidence:Math.min(90,60+Math.round((Math.abs(lS.price-rS.price)/tol)*5)),
        desc:'Classic H&S — expect breakdown below neckline'
      });
    }
  }

  // ── INVERTED H&S (Bullish) ──
  if(lows.length>=3){
    const rL=lows.slice(-3);
    const [lS,head,rS]=rL;
    if(head && head.price<lS.price && head.price<rS.price &&
       Math.abs(lS.price-rS.price)<tol*2 &&
       lS.price-head.price>tol){
      const neckHighs=highs.filter(h=>h.i>lS.i&&h.i<rS.i);
      const neckline=neckHighs.length>0?neckHighs.reduce((a,b)=>a.price>b.price?a:b).price:lS.price+tol;
      const height=neckline-head.price;
      patterns.push({
        type:'Inverted H&S', dir:'bullish',
        points:[lS,head,rS], neckline,
        entry:neckline, sl:rS.price-tol, tp:neckline+height,
        confidence:Math.min(90,60+Math.round((Math.abs(lS.price-rS.price)/tol)*5)),
        desc:'Inv. H&S — expect breakout above neckline'
      });
    }
  }

  // ── DOUBLE TOP (Bearish) ──
  if(highs.length>=2){
    const [h1,h2]=highs.slice(-2);
    if(h2&&Math.abs(h1.price-h2.price)<tol&&h2.i-h1.i>4){
      const midLows=lows.filter(l=>l.i>h1.i&&l.i<h2.i);
      const neckline=midLows.length>0?midLows[0].price:h1.price-priceRange*0.04;
      const height=h1.price-neckline;
      patterns.push({
        type:'Double Top', dir:'bearish',
        points:[h1,h2], neckline,
        entry:neckline, sl:Math.max(h1.price,h2.price)+tol, tp:neckline-height,
        confidence:75,
        desc:'Double Top — two equal highs, bearish reversal signal'
      });
    }
  }

  // ── DOUBLE BOTTOM (Bullish) ──
  if(lows.length>=2){
    const [l1,l2]=lows.slice(-2);
    if(l2&&Math.abs(l1.price-l2.price)<tol&&l2.i-l1.i>4){
      const midHighs=highs.filter(h=>h.i>l1.i&&h.i<l2.i);
      const neckline=midHighs.length>0?midHighs[0].price:l1.price+priceRange*0.04;
      const height=neckline-l1.price;
      patterns.push({
        type:'Double Bottom', dir:'bullish',
        points:[l1,l2], neckline,
        entry:neckline, sl:Math.min(l1.price,l2.price)-tol, tp:neckline+height,
        confidence:75,
        desc:'Double Bottom — two equal lows, bullish reversal signal'
      });
    }
  }

  // ── TRIPLE TOP (Bearish) ──
  if(highs.length>=3){
    const [h1,h2,h3]=highs.slice(-3);
    if(h3&&Math.abs(h1.price-h2.price)<tol&&Math.abs(h2.price-h3.price)<tol){
      const neckline=Math.min(...lows.filter(l=>l.i>h1.i&&l.i<h3.i).map(l=>l.price))||h1.price-priceRange*0.05;
      const height=h1.price-neckline;
      patterns.push({
        type:'Triple Top', dir:'bearish',
        points:[h1,h2,h3], neckline,
        entry:neckline, sl:Math.max(h1.price,h2.price,h3.price)+tol, tp:neckline-height,
        confidence:80,
        desc:'Triple Top — three equal highs, strong reversal signal'
      });
    }
  }

  // ── TRIPLE BOTTOM (Bullish) ──
  if(lows.length>=3){
    const [l1,l2,l3]=lows.slice(-3);
    if(l3&&Math.abs(l1.price-l2.price)<tol&&Math.abs(l2.price-l3.price)<tol){
      const neckline=Math.max(...highs.filter(h=>h.i>l1.i&&h.i<l3.i).map(h=>h.price))||l1.price+priceRange*0.05;
      const height=neckline-l1.price;
      patterns.push({
        type:'Triple Bottom', dir:'bullish',
        points:[l1,l2,l3], neckline,
        entry:neckline, sl:Math.min(l1.price,l2.price,l3.price)-tol, tp:neckline+height,
        confidence:80,
        desc:'Triple Bottom — three equal lows, strong bullish signal'
      });
    }
  }

  // ── FALLING WEDGE (Bullish) ──
  if(highs.length>=3&&lows.length>=3){
    const rH=highs.slice(-3), rL=lows.slice(-3);
    const hSlope=(rH[2].price-rH[0].price)/(rH[2].i-rH[0].i);
    const lSlope=(rL[2].price-rL[0].price)/(rL[2].i-rL[0].i);
    if(hSlope<-tol/10&&lSlope<-tol/10&&hSlope<lSlope){
      patterns.push({
        type:'Falling Wedge', dir:'bullish',
        points:rH, neckline:rL[2].price,
        entry:last.close, sl:rL[2].price-tol, tp:rH[0].price,
        confidence:70,
        desc:'Falling Wedge — converging downtrend, bullish breakout expected'
      });
    }
  }

  // ── RISING WEDGE (Bearish) ──
  if(highs.length>=3&&lows.length>=3){
    const rH=highs.slice(-3), rL=lows.slice(-3);
    const hSlope=(rH[2].price-rH[0].price)/(rH[2].i-rH[0].i);
    const lSlope=(rL[2].price-rL[0].price)/(rL[2].i-rL[0].i);
    if(hSlope>tol/10&&lSlope>tol/10&&lSlope>hSlope){
      patterns.push({
        type:'Rising Wedge', dir:'bearish',
        points:rL, neckline:rH[2].price,
        entry:last.close, sl:rH[2].price+tol, tp:rL[0].price,
        confidence:70,
        desc:'Rising Wedge — converging uptrend, bearish breakdown expected'
      });
    }
  }

  return patterns;
}

async function fetchTDCandles(pair, tf, apiKey) {
  const sym  = TD_SYMBOLS[pair] || pair;
  const intv = TD_INTERVALS_MAP[tf] || '4h';
  const url  = `https://api.twelvedata.com/time_series?symbol=${sym}&interval=${intv}&outputsize=200&apikey=${apiKey}`;
  const r    = await fetch(url);
  const d    = await r.json();
  if (!d.values || d.status === 'error') throw new Error(d.message || 'API error');
  // TD returns newest first, reverse to oldest first
  return d.values.reverse().map(v => ({
    time:  Math.floor(new Date(v.datetime).getTime()/1000),
    open:  parseFloat(v.open),
    high:  parseFloat(v.high),
    low:   parseFloat(v.low),
    close: parseFloat(v.close),
  }));
}

function useLivePrice(pair) {
  const [price, setPrice]     = React.useState(LIVE_PRICES[pair] || 1);
  const [change, setChange]   = React.useState(0);
  const [pct, setPct]         = React.useState(0);
  const [source, setSource]   = React.useState('SIM');
  const priceRef  = React.useRef(LIVE_PRICES[pair] || 1);
  const openRef   = React.useRef(LIVE_PRICES[pair] || 1);
  const wsRef     = React.useRef(null);
  const simRef    = React.useRef(null);

  React.useEffect(() => {
    const base = LIVE_PRICES[pair] || 1;
    priceRef.current = base;
    openRef.current  = base;
    setPrice(base); setChange(0); setPct(0);

    function startSim() {
      // Don't simulate if market is closed (except crypto)
      const isCrypto = pair === 'BTC/USD';
      if (!isCrypto && !isForexOpen()) {
        setSource('CLOSED');
        return;
      }
      setSource('SIM');
      const tv = TICK_VOL[pair] || 0.0001;
      let p = priceRef.current;
      let drift = 0, dt = 0;
      simRef.current = setInterval(() => {
        // Pause sim if market closed (recheck every tick)
        if (!isCrypto && !isForexOpen()) {
          clearInterval(simRef.current);
          simRef.current = null;
          setSource('CLOSED');
          return;
        }
        dt++;
        if (dt > 8 + Math.floor(Math.random()*12)) { drift=(Math.random()-.5)*tv*2; dt=0; }
        const dev = (p-base)/base;
        p = parseFloat((p + (Math.random()-.5+drift-dev*0.08)*tv)
              .toFixed(pair.includes('JPY')||pair==='BTC/USD'||pair==='XAU/USD'?2:5));
        priceRef.current = p;
        const ch = p - openRef.current;
        setPrice(p);
        setChange(parseFloat(ch.toFixed(5)));
        setPct(parseFloat(((ch/openRef.current)*100).toFixed(3)));
      }, 600);
    }

    function connectBinance() {
      // For BTC/USD always try Binance first
      try {
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        wsRef.current = ws;
        ws.onopen = () => setSource('BINANCE');
        ws.onmessage = e => {
          const d = JSON.parse(e.data);
          const p = parseFloat(d.c);
          priceRef.current = p;
          openRef.current = parseFloat(d.o);
          setPrice(p);
          setChange(parseFloat(d.p));
          setPct(parseFloat(d.P));
        };
        ws.onerror = () => startSim();
        ws.onclose = () => startSim();
      } catch { startSim(); }
    }

    function connectTwelveData(apiKey) {
      try {
        const ws = new WebSocket('wss://ws.twelvedata.com/v1/quotes/price?apikey=' + apiKey);
        wsRef.current = ws;
        ws.onopen = () => {
          setSource('LIVE');
          ws.send(JSON.stringify({
            action: 'subscribe',
            params: { symbols: TD_SYMBOLS[pair] || pair }
          }));
        };
        ws.onmessage = e => {
          const d = JSON.parse(e.data);
          if (d.event === 'price' && d.price) {
            const p = parseFloat(d.price);
            if (isNaN(p) || p <= 0) return;
            priceRef.current = p;
            const ch = p - openRef.current;
            setPrice(p);
            setChange(parseFloat(ch.toFixed(5)));
            setPct(parseFloat(((ch/openRef.current)*100).toFixed(3)));
          }
          if (d.event === 'heartbeat') setSource('LIVE');
          // If error (bad key etc) fallback to sim
          if (d.event === 'error') { ws.close(); startSim(); }
        };
        ws.onerror = () => startSim();
        ws.onclose = () => {};

        // Also fetch current price via REST to get open price
        fetch(`https://api.twelvedata.com/price?symbol=${TD_SYMBOLS[pair]||pair}&apikey=${apiKey}`)
          .then(r=>r.json()).then(d=>{
            if (d.price) {
              const p = parseFloat(d.price);
              openRef.current = p;
              priceRef.current = p;
              setPrice(p);
            }
          }).catch(()=>{});

      } catch { startSim(); }
    }

    // Decide connection strategy
    if (pair === 'BTC/USD' && !TD_API_KEY) {
      connectBinance();
    } else if (TD_API_KEY) {
      connectTwelveData(TD_API_KEY);
    } else {
      startSim();
    }

    return () => {
      if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
      if (simRef.current) { clearInterval(simRef.current); simRef.current = null; }
    };
  }, [pair]);

  return { price, change, pct, source };
}

function seededRand(seed){
  let s = seed|0;
  return () => { s = (s*1664525 + 1013904223)|0; return (s>>>0)/0xFFFFFFFF; };
}

function generateCandles(pair, tf) {
  const base = BASE_PRICES[pair] || 1;
  const isJPY = pair.includes('JPY');
  const isBTC = pair === 'BTC/USD';
  const isGold = pair === 'XAU/USD';
  const dec = isJPY || isBTC || isGold ? 2 : 5;

  // Volatility per candle (realistic pip range)
  const pipVol = {
    'EUR/USD':0.0012,'GBP/USD':0.0016,'AUD/USD':0.0010,'NZD/USD':0.0009,
    'USD/JPY':0.18,  'USD/CAD':0.0013,'USD/CHF':0.0012,'GBP/JPY':0.28,
    'EUR/GBP':0.0008,'XAU/USD':4.5,   'BTC/USD':350,
    'ETH/USD':25,'SOL/USD':2.8,'XRP/USD':0.006,'BNB/USD':8,
    'US500':12,'NAS100':40,'GER40':80,'XAG/USD':0.18,'USOIL':0.35
  };
  const tfMult = {
    '1m':0.06,'3m':0.12,'5m':0.18,'15m':0.28,'30m':0.42,'45m':0.52,
    '1H':0.7,'2H':1.0,'4H':1.5,'1D':3.2,'1W':6.5
  };
  const vol = (pipVol[pair]||0.001) * (tfMult[tf]||1);
  const interval = TF_SEC[tf] || 3600;

  const seed = pair.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*31 + ['30m','1H','2H','4H','1D','1W'].indexOf(tf)*7;
  const rand = seededRand(seed);

  const now = Math.floor(Date.now()/1000);
  const count = 200;
  let price = base;
  const candles = [];
  let trendDir = rand()>0.5?1:-1, trendLen=0, trendMax=Math.floor(rand()*12)+4;

  for(let i=count-1; i>=0; i--){
    const t = Math.floor((now - i*interval)/interval)*interval;

    // Trend switch
    trendLen++;
    if(trendLen >= trendMax){
      trendDir = -trendDir;
      trendLen = 0;
      trendMax = Math.floor(rand()*12)+4;
    }

    // Mean reversion — hard clamp ±1.5% from base
    const dev = (price - base)/base;
    const mr = -dev * 0.3 * vol * 5;

    // Body: realistic size
    const bodyFrac = rand()*0.7 + 0.25; // 25%-95% of vol
    const dir = (rand() < (0.5 + trendDir*0.15)) ? 1 : -1;
    const bodySize = bodyFrac * vol;
    const o = parseFloat(price.toFixed(dec));
    const c = parseFloat((o + dir*bodySize + mr).toFixed(dec));

    // Wicks
    const wickUp   = rand()*vol*0.5;
    const wickDown = rand()*vol*0.5;
    const h = parseFloat((Math.max(o,c) + wickUp).toFixed(dec));
    const l = parseFloat((Math.min(o,c) - wickDown).toFixed(dec));

    price = c;
    candles.push({time:t, open:o, high:h, low:l, close:c});
  }
  return candles;
}

function getAOIZones(pair, tf, settings, currentPrice) {
  const base = currentPrice || BASE_PRICES[pair] || 1;
  const isJPY = pair.includes('JPY');
  const isBTC = pair === 'BTC/USD';
  const isGold = pair === 'XAU/USD';
  const dec = isJPY || isBTC || isGold ? 2 : 5;
  const pipSize = isJPY?0.01 : isBTC?1 : isGold?0.1 : 0.0001;
  const p = (n) => parseFloat((base + n*pipSize).toFixed(dec));

  const tfOrder = ['30m','1H','2H','4H','1D','1W'];
  const tfIdx = tfOrder.indexOf(tf);
  const zones = [];

  // Support zones below base, resistance above
  // Fewer, more realistic zones — based on % of price not fixed pips
  const pct1 = base * 0.003;  // ~0.3% distance for 4H zones
  const pct2 = base * 0.007;  // ~0.7% for Daily
  const pct3 = base * 0.015;  // ~1.5% for Weekly
  const toPips = v => Math.round(v / pipSize);
  const defs = [
    {src:'1W', pips:+toPips(pct3*2.2), w:14}, {src:'1W', pips:+toPips(pct3*1.1), w:12},
    {src:'1D', pips:+toPips(pct2*1.5), w: 9}, {src:'1D', pips:+toPips(pct2*0.7), w: 8},
    {src:'4H', pips:+toPips(pct1*1.8), w: 7}, {src:'4H', pips:+toPips(pct1*0.8), w: 6},
    {src:'4H', pips:-toPips(pct1*0.8), w: 6}, {src:'4H', pips:-toPips(pct1*1.8), w: 7},
    {src:'1D', pips:-toPips(pct2*0.7), w: 8}, {src:'1D', pips:-toPips(pct2*1.5), w: 9},
    {src:'1W', pips:-toPips(pct3*1.1), w:12}, {src:'1W', pips:-toPips(pct3*2.2), w:14},
  ];

  defs.forEach(({src, pips, w}, i) => {
    const srcIdx = tfOrder.indexOf(src);
    if (srcIdx < tfIdx) return; // don't show lower-TF zones on higher TF
    if (src==='1W' && settings?.weeklyAoi===false) return;
    if (src==='1D' && tf==='4H' && settings?.dailyAoi===false) return;
    if (settings?.showAois===false) return;
    const half = w;
    const mid = pips;
    const label = src+'.AOI'+(i<6 ? (i+1) : (i-5));
    zones.push({
      label, src,
      top:    p(mid+half),
      bottom: p(mid-half),
      style:  AOI_STYLE_MAP[src],
      type:   pips>0?'resistance':'support',
    });
  });
  return zones;
}

function AthenaChart({pair, tf, chartSettings, livePrice, tradeLines}) {
  const containerRef = useRef(null);
  const chartRef     = useRef(null);
  const seriesRef    = useRef(null);
  const [aoiDims,  setAoiDims]  = useState({});
  const [candles,  setCandles]  = useState(() => generateCandles(pair, tf));
  const [loading,  setLoading]  = useState(false);
  const [dataSource, setDataSource] = useState('SIM');

  // Fetch real candles from Twelve Data if API key exists
  useEffect(() => {
    if (!TD_API_KEY) {
      setCandles(generateCandles(pair, tf));
      setDataSource('SIM');
      return;
    }
    setLoading(true);
    fetchTDCandles(pair, tf, TD_API_KEY)
      .then(data => {
        setCandles(data);
        setDataSource('LIVE');
        setLoading(false);
      })
      .catch(err => {
        console.warn('TD fetch failed:', err.message, '— using simulation');
        setCandles(generateCandles(pair, tf));
        setDataSource('SIM');
        setLoading(false);
      });
  }, [pair, tf]);

  // Update last candle with live price tick + refresh AOI dims
  useEffect(() => {
    if (!seriesRef.current || !livePrice || !candles.length) return;
    const last = candles[candles.length - 1];
    const isJPY2 = pair.includes('JPY');
    const isBTC2 = pair === 'BTC/USD';
    const isGold2 = pair === 'XAU/USD';
    const d = isJPY2 || isBTC2 || isGold2 ? 2 : 5;
    const updatedCandle = {
      time:  last.time,
      open:  last.open,
      high:  Math.max(last.high,  parseFloat(livePrice.toFixed(d))),
      low:   Math.min(last.low,   parseFloat(livePrice.toFixed(d))),
      close: parseFloat(livePrice.toFixed(d)),
    };
    try { seriesRef.current.update(updatedCandle); } catch(e){}
    // Refresh AOI positions every ~5 ticks
    if (Math.random() < 0.2 && seriesRef.current) {
      const dims={};
      aoiZones.forEach((z,i)=>{
        const ty=seriesRef.current.priceToCoordinate(z.top);
        const by=seriesRef.current.priceToCoordinate(z.bottom);
        if(ty!=null&&by!=null) dims[i]={top:Math.min(ty,by),height:Math.max(Math.abs(ty-by),4)};
      });
      if(Object.keys(dims).length>0) setAoiDims(dims);
    }
  }, [livePrice]);
  const currentPrice = candles.length ? candles[candles.length-1].close : (BASE_PRICES[pair]||1);
  const aoiZones   = useMemo(() => getAOIZones(pair, tf, chartSettings, currentPrice),
    [pair, tf, chartSettings?.showAois, chartSettings?.weeklyAoi, chartSettings?.dailyAoi, currentPrice]);
  const patterns   = useMemo(() => detectPatterns(candles), [candles]);
  const [selPattern, setSelPattern] = useState(null);

  const lastC = candles[candles.length-1];
  const prevC = candles[candles.length-2];
  const isBull = lastC && prevC ? lastC.close >= prevC.close : true;
  const isJPY    = pair.includes('JPY');
  const isCrypto = ['BTC/USD','ETH/USD','SOL/USD','BNB/USD','LTC/USD'].includes(pair);
  const isIndex  = ['US500','NAS100','GER40','UK100','JP225','AUS200','FRA40'].includes(pair);
  const isCommod = ['XAU/USD','XAG/USD','USOIL','UKOIL','NGAS','COPPER'].includes(pair);
  const isSmallCrypto = ['XRP/USD','ADA/USD','DOGE/USD','MATIC/USD'].includes(pair);
  const dec = isJPY||isCrypto||isIndex||isCommod ? 2 : isSmallCrypto ? 5 : 5;

  useEffect(() => {
    if (!containerRef.current) return;
    const el = containerRef.current;
    const lc = window.LightweightCharts;
    if (!lc) return;

    const chart = lc.createChart(el, {
      layout: {
        background: {color:'#0b0e1a'},
        textColor:  '#8892aa',
        fontSize:   11,
        fontFamily: "'Inter',sans-serif",
      },
      grid: {
        vertLines: {color: chartSettings?.grid ? 'rgba(26,34,56,.5)' : 'rgba(26,34,56,.0)'},
        horzLines: {color: chartSettings?.grid ? 'rgba(26,34,56,.5)' : 'rgba(26,34,56,.12)'},
      },
      rightPriceScale: {
        borderColor:'#232840',
        scaleMargins:{top:0.06, bottom:0.06},
      },
      timeScale: {
        borderColor:'#232840',
        timeVisible:true,
        secondsVisible:false,
      },
      crosshair: {
        mode: lc.CrosshairMode.Normal,
        vertLine:{color:'rgba(59,130,246,.5)',style:1,width:1,labelBackgroundColor:'#2563eb'},
        horzLine:{color:'rgba(59,130,246,.5)',style:1,width:1,labelBackgroundColor:'#2563eb'},
      },
      width:  el.clientWidth,
      height: el.clientHeight,
    });

    // Candlestick series — blue for bullish like the screenshots
    const series = chart.addCandlestickSeries({
      upColor:        '#2962FF',
      downColor:      '#ef4444',
      borderUpColor:  '#2962FF',
      borderDownColor:'#ef4444',
      wickUpColor:    '#2962FF',
      wickDownColor:  '#ef4444',
    });
    series.setData(candles);

    // ── INDICATOR MATH HELPERS ──
    const calcEMA = (data, period) => {
      const k = 2/(period+1);
      let ema = data[0];
      return data.map((v,i) => { ema = i===0?v:v*k+ema*(1-k); return parseFloat(ema.toFixed(dec)); });
    };
    const closes = candles.map(c=>c.close);
    const times  = candles.map(c=>c.time);
    const zip    = (vals) => vals.map((v,i)=>({time:times[i],value:v}));

    // ── EMA 50 ──
    if (chartSettings?.ema50 !== false) {
      const s = chart.addLineSeries({color:'rgba(59,130,246,.7)',lineWidth:1,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
      s.setData(zip(calcEMA(closes,50)));
    }

    // ── SMA 20 ──
    if (chartSettings?.sma20) {
      const smaData = closes.map((_,i)=>{
        if(i<19) return null;
        const avg = closes.slice(i-19,i+1).reduce((a,b)=>a+b,0)/20;
        return parseFloat(avg.toFixed(dec));
      });
      const s = chart.addLineSeries({color:'rgba(245,158,11,.7)',lineWidth:1,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
      s.setData(times.map((t,i)=>smaData[i]!=null?{time:t,value:smaData[i]}:null).filter(Boolean));
    }

    // ── BOLLINGER BANDS ──
    if (chartSettings?.boll) {
      const period=20, mult=2;
      const bbData = closes.map((_,i)=>{
        if(i<period-1) return null;
        const slice=closes.slice(i-period+1,i+1);
        const mean=slice.reduce((a,b)=>a+b,0)/period;
        const std=Math.sqrt(slice.map(v=>(v-mean)**2).reduce((a,b)=>a+b,0)/period);
        return {upper:parseFloat((mean+mult*std).toFixed(dec)),
                mid:parseFloat(mean.toFixed(dec)),
                lower:parseFloat((mean-mult*std).toFixed(dec))};
      });
      const valid = bbData.map((d,i)=>d?{time:times[i],...d}:null).filter(Boolean);
      const addBB=(key,color,dash)=>{
        const s=chart.addLineSeries({color,lineWidth:1,lineStyle:dash?lc.LineStyle.Dashed:lc.LineStyle.Solid,
          lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
        s.setData(valid.map(d=>({time:d.time,value:d[key]})));
      };
      addBB('upper','rgba(168,85,247,.6)',true);
      addBB('mid','rgba(168,85,247,.4)',false);
      addBB('lower','rgba(168,85,247,.6)',true);
    }

    // ── PARABOLIC SAR ──
    if (chartSettings?.psar) {
      const step=0.02, maxAF=0.2;
      let bull=true, af=step, ep=candles[0].low, sar=candles[0].high;
      const psarData=candles.map((c,i)=>{
        if(i===0) return {time:c.time,value:parseFloat(sar.toFixed(dec))};
        const prevSar=sar;
        sar=sar+af*(ep-sar);
        if(bull){
          if(c.low<sar){bull=false;sar=ep;ep=c.low;af=step;}
          else{if(c.high>ep){ep=c.high;af=Math.min(af+step,maxAF);}
          sar=Math.min(sar,candles[i-1].low,i>1?candles[i-2].low:candles[i-1].low);}
        } else {
          if(c.high>sar){bull=true;sar=ep;ep=c.high;af=step;}
          else{if(c.low<ep){ep=c.low;af=Math.min(af+step,maxAF);}
          sar=Math.max(sar,candles[i-1].high,i>1?candles[i-2].high:candles[i-1].high);}
        }
        return {time:c.time,value:parseFloat(sar.toFixed(dec))};
      });
      const s=chart.addLineSeries({color:'rgba(251,191,36,.8)',lineWidth:1,lineStyle:lc.LineStyle.Dotted,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
      s.setData(psarData);
    }

    // ── RSI (14) — pane 1 ──
    if (chartSettings?.rsi) {
      const period=14;
      const rsiVals=closes.map((_,i)=>{
        if(i<period) return null;
        const gains=[],losses=[];
        for(let j=i-period+1;j<=i;j++){
          const d=closes[j]-closes[j-1];
          gains.push(d>0?d:0); losses.push(d<0?-d:0);
        }
        const ag=gains.reduce((a,b)=>a+b,0)/period;
        const al=losses.reduce((a,b)=>a+b,0)/period;
        return al===0?100:parseFloat((100-100/(1+ag/al)).toFixed(2));
      });
      const rsiS=chart.addLineSeries({color:'#a855f7',lineWidth:1,pane:1,
        lastValueVisible:true,priceLineVisible:false,crosshairMarkerVisible:true,
        priceScaleId:'rsi',title:'RSI'});
      rsiS.setData(times.map((t,i)=>rsiVals[i]!=null?{time:t,value:rsiVals[i]}:null).filter(Boolean));
      // Overbought/oversold lines
      const ob=chart.addLineSeries({color:'rgba(239,68,68,.4)',lineWidth:1,lineStyle:lc.LineStyle.Dashed,pane:1,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false,priceScaleId:'rsi'});
      ob.setData(times.map(t=>({time:t,value:70})));
      const os=chart.addLineSeries({color:'rgba(16,185,129,.4)',lineWidth:1,lineStyle:lc.LineStyle.Dashed,pane:1,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false,priceScaleId:'rsi'});
      os.setData(times.map(t=>({time:t,value:30})));
    }

    // ── MACD (12,26,9) — pane 2 ──
    if (chartSettings?.macd) {
      const ema12=calcEMA(closes,12), ema26=calcEMA(closes,26);
      const macdLine=ema12.map((v,i)=>parseFloat((v-ema26[i]).toFixed(dec)));
      const signal=calcEMA(macdLine,9);
      const hist=macdLine.map((v,i)=>parseFloat((v-signal[i]).toFixed(dec)));
      const paneNum=chartSettings?.rsi?2:1;
      const hS=chart.addHistogramSeries({pane:paneNum,
        color:'rgba(59,130,246,.6)',priceScaleId:'macd',title:'MACD'});
      hS.setData(times.map((t,i)=>({time:t,value:hist[i],
        color:hist[i]>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'})));
      const mS=chart.addLineSeries({color:'#60a5fa',lineWidth:1,pane:paneNum,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false,priceScaleId:'macd'});
      mS.setData(zip(macdLine));
      const sS=chart.addLineSeries({color:'#f97316',lineWidth:1,pane:paneNum,
        lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false,priceScaleId:'macd'});
      sS.setData(zip(signal));
    }

    // ── STOCHASTIC (14,3,3) — next pane ──
    if (chartSettings?.stoch) {
      const period=14, smooth=3;
      const kVals=candles.map((_,i)=>{
        if(i<period-1) return null;
        const sl=candles.slice(i-period+1,i+1);
        const hi=Math.max(...sl.map(c=>c.high));
        const lo=Math.min(...sl.map(c=>c.low));
        return hi===lo?50:parseFloat(((candles[i].close-lo)/(hi-lo)*100).toFixed(2));
      });
      const dVals=kVals.map((_,i)=>{
        if(i<smooth-1||kVals[i]==null) return null;
        const sl=kVals.slice(i-smooth+1,i+1).filter(v=>v!=null);
        return sl.length===smooth?parseFloat((sl.reduce((a,b)=>a+b,0)/smooth).toFixed(2)):null;
      });
      const paneNum=(chartSettings?.rsi?1:0)+(chartSettings?.macd?1:0)+1;
      const kS=chart.addLineSeries({color:'#22d3ee',lineWidth:1,pane:paneNum,
        lastValueVisible:true,priceLineVisible:false,priceScaleId:'stoch',title:'%K'});
      kS.setData(times.map((t,i)=>kVals[i]!=null?{time:t,value:kVals[i]}:null).filter(Boolean));
      const dS=chart.addLineSeries({color:'#f97316',lineWidth:1,pane:paneNum,
        lastValueVisible:false,priceLineVisible:false,priceScaleId:'stoch'});
      dS.setData(times.map((t,i)=>dVals[i]!=null?{time:t,value:dVals[i]}:null).filter(Boolean));
    }

    // ── ATR (14) — next pane ──
    if (chartSettings?.atr) {
      const period=14;
      const trVals=candles.map((c,i)=>{
        if(i===0) return c.high-c.low;
        return Math.max(c.high-c.low,Math.abs(c.high-candles[i-1].close),Math.abs(c.low-candles[i-1].close));
      });
      const atrVals=trVals.map((_,i)=>{
        if(i<period-1) return null;
        return parseFloat((trVals.slice(i-period+1,i+1).reduce((a,b)=>a+b,0)/period).toFixed(dec));
      });
      const paneNum=(chartSettings?.rsi?1:0)+(chartSettings?.macd?1:0)+(chartSettings?.stoch?1:0)+1;
      const s=chart.addLineSeries({color:'#fb923c',lineWidth:1,pane:paneNum,
        lastValueVisible:true,priceLineVisible:false,priceScaleId:'atr',title:'ATR'});
      s.setData(times.map((t,i)=>atrVals[i]!=null?{time:t,value:atrVals[i]}:null).filter(Boolean));
    }

    // ── ADX (14) — next pane ──
    if (chartSettings?.adx) {
      const period=14;
      const adxData=candles.map((_,i)=>{
        if(i<period*2) return null;
        const slice=candles.slice(i-period+1,i+1);
        let plusDM=0,minusDM=0,tr=0;
        for(let j=1;j<slice.length;j++){
          const up=slice[j].high-slice[j-1].high;
          const dn=slice[j-1].low-slice[j].low;
          plusDM+=up>dn&&up>0?up:0;
          minusDM+=dn>up&&dn>0?dn:0;
          tr+=Math.max(slice[j].high-slice[j].low,
            Math.abs(slice[j].high-slice[j-1].close),
            Math.abs(slice[j].low-slice[j-1].close));
        }
        if(tr===0) return null;
        const diPlus=(plusDM/tr)*100;
        const diMinus=(minusDM/tr)*100;
        const sum=diPlus+diMinus;
        return sum===0?null:parseFloat((Math.abs(diPlus-diMinus)/sum*100).toFixed(2));
      });
      const paneNum=(chartSettings?.rsi?1:0)+(chartSettings?.macd?1:0)+(chartSettings?.stoch?1:0)+(chartSettings?.atr?1:0)+1;
      const s=chart.addLineSeries({color:'#4ade80',lineWidth:1,pane:paneNum,
        lastValueVisible:true,priceLineVisible:false,priceScaleId:'adx',title:'ADX'});
      s.setData(times.map((t,i)=>adxData[i]!=null?{time:t,value:adxData[i]}:null).filter(Boolean));
      // 25 level line
      const l25=chart.addLineSeries({color:'rgba(255,255,255,.2)',lineWidth:1,lineStyle:lc.LineStyle.Dashed,
        pane:paneNum,lastValueVisible:false,priceLineVisible:false,priceScaleId:'adx'});
      l25.setData(times.map(t=>({time:t,value:25})));
    }

    // ── TRADE LINES: Entry / SL / TP ──
    if (tradeLines) {
      const { entry, sl, tp, dir } = tradeLines;
      const eVal = parseFloat(entry);
      const slVal = parseFloat(sl);
      const tpVal = parseFloat(tp);
      if (entry && !isNaN(eVal)) {
        series.createPriceLine({
          price: eVal, color: 'rgba(255,255,255,.85)',
          lineWidth:2, lineStyle:lc.LineStyle.Dashed,
          title:'  ◆ ENTRY  ', axisLabelVisible:true,
        });
      }
      if (sl && !isNaN(slVal)) {
        series.createPriceLine({
          price: slVal, color:'#ef4444',
          lineWidth:2, lineStyle:lc.LineStyle.Solid,
          title:'  ✕ STOP LOSS  ', axisLabelVisible:true,
        });
      }
      if (tp && !isNaN(tpVal)) {
        series.createPriceLine({
          price: tpVal, color:'#10b981',
          lineWidth:2, lineStyle:lc.LineStyle.Solid,
          title:'  ✓ TAKE PROFIT  ', axisLabelVisible:true,
        });
      }
      // Risk zone (between entry and SL)
      if (entry && sl && !isNaN(eVal) && !isNaN(slVal)) {
        const riskTop = Math.max(eVal, slVal);
        const riskBot = Math.min(eVal, slVal);
        series.createPriceLine({
          price: (riskTop+riskBot)/2, color:'rgba(239,68,68,.0)',
          lineWidth:1, lineStyle:lc.LineStyle.Solid,
          title:'', axisLabelVisible:false,
        });
      }
    }

    // AOI zones as price bands
    if (chartSettings?.showAois !== false) {
      aoiZones.forEach(z => {
        // Top boundary
        series.createPriceLine({
          price: z.top, color: z.style.border,
          lineWidth:1, lineStyle:lc.LineStyle.Dashed,
          title: z.label, axisLabelVisible:true,
        });
        // Bottom boundary
        series.createPriceLine({
          price: z.bottom, color: z.style.border,
          lineWidth:1, lineStyle:lc.LineStyle.Dashed,
          title:'', axisLabelVisible:false,
        });
      });
    }

    // ── PATTERN LINES ON CHART ──
    patterns.forEach(pat => {
      const col = pat.dir==='bullish' ? '#10b981' : '#ef4444';
      const colFaint = pat.dir==='bullish' ? 'rgba(16,185,129,.35)' : 'rgba(239,68,68,.35)';
      // Neckline
      if (pat.neckline) {
        series.createPriceLine({
          price: pat.neckline, color: col, lineWidth: 1,
          lineStyle: lc.LineStyle.Dashed,
          title: ' ' + pat.type + ' neckline', axisLabelVisible: true,
        });
      }
      // Entry
      if (pat.entry) {
        series.createPriceLine({
          price: pat.entry, color: 'rgba(255,255,255,.5)', lineWidth: 1,
          lineStyle: lc.LineStyle.Dotted, title: ' Entry', axisLabelVisible: false,
        });
      }
      // TP
      if (pat.tp) {
        series.createPriceLine({
          price: pat.tp, color: '#10b981', lineWidth: 1,
          lineStyle: lc.LineStyle.Dotted, title: ' TP', axisLabelVisible: true,
        });
      }
      // SL
      if (pat.sl) {
        series.createPriceLine({
          price: pat.sl, color: '#ef4444', lineWidth: 1,
          lineStyle: lc.LineStyle.Dotted, title: ' SL', axisLabelVisible: true,
        });
      }
    });

    // Add pattern markers on series
    if (patterns.length > 0) {
      const markers = [];
      patterns.forEach(pat => {
        const col = pat.dir==='bullish' ? '#10b981' : '#ef4444';
        if (pat.points && pat.points.length > 0) {
          const mainPoint = pat.points[Math.floor(pat.points.length/2)];
          markers.push({
            time: mainPoint.time,
            position: pat.dir==='bullish' ? 'belowBar' : 'aboveBar',
            color: col,
            shape: pat.dir==='bullish' ? 'arrowUp' : 'arrowDown',
            text: pat.type.split(' ').map(w=>w[0]).join(''),
            size: 2,
          });
        }
      });
      if (markers.length > 0) {
        series.setMarkers(markers.sort((a,b)=>a.time-b.time));
      }
    }

    // Current price line
    if (lastC) {
      series.createPriceLine({
        price:lastC.close, color:'rgba(255,255,255,.35)', lineWidth:1,
        lineStyle:lc.LineStyle.Solid, title:'', axisLabelVisible:true,
      });
    }

    chart.timeScale().fitContent();
    chartRef.current = chart;
    seriesRef.current = series;

    // AOI overlay positioning — run repeatedly until dims populated
    const updateAoiDims = () => {
      if (!seriesRef.current) return;
      const dims={};
      aoiZones.forEach((z,i)=>{
        const ty=seriesRef.current.priceToCoordinate(z.top);
        const by=seriesRef.current.priceToCoordinate(z.bottom);
        if(ty!=null&&by!=null) dims[i]={top:Math.min(ty,by),height:Math.max(Math.abs(ty-by),4)};
      });
      // Only update if we got real dims
      if(Object.keys(dims).length>0) setAoiDims(dims);
    };
    // Subscribe to both time and price scale changes
    chart.timeScale().subscribeVisibleLogicalRangeChange(()=>requestAnimationFrame(updateAoiDims));
    chart.subscribeCrosshairMove(()=>requestAnimationFrame(updateAoiDims));
    // Run multiple times to ensure chart is ready
    setTimeout(updateAoiDims, 200);
    setTimeout(updateAoiDims, 600);
    setTimeout(updateAoiDims, 1200);
    setTimeout(updateAoiDims, 2500);

    const ro = new ResizeObserver(()=>{
      chart.resize(el.clientWidth,el.clientHeight);
      setTimeout(updateAoiDims,100);
    });
    ro.observe(el);

    return () => { ro.disconnect(); chart.remove(); chartRef.current=null; seriesRef.current=null; };
  }, [candles,
    chartSettings?.ema50, chartSettings?.sma20, chartSettings?.boll, chartSettings?.psar,
    chartSettings?.rsi, chartSettings?.macd, chartSettings?.stoch, chartSettings?.atr, chartSettings?.adx,
    chartSettings?.showAois, chartSettings?.grid,
    JSON.stringify(aoiZones.map(z=>z.label)),
    JSON.stringify(tradeLines)
  ]);

  return (
    <div style={{position:'relative', width:'100%', height:'100%'}}>
      <div ref={containerRef} style={{width:'100%',height:'100%'}}/>

      {/* AOI colored fill overlays */}
      {chartSettings?.showAois !== false && aoiZones.map((z,i) => {
        const d = aoiDims[i];
        if (!d) return null;
        return (
          <div key={i} style={{
            position:'absolute',
            top: Math.max(0, d.top),
            left:0, right:65,
            height: Math.max(d.height, 6),
            background:z.style.bg,
            borderTop:   `1.5px solid ${z.style.border}`,
            borderBottom:`1.5px solid ${z.style.border}`,
            pointerEvents:'none', zIndex:3,
            display:'flex', alignItems:'center', paddingLeft:8,
            boxShadow: `inset 0 0 8px ${z.style.bg}`,
          }}>
            <div style={{
              display:'flex', alignItems:'center', gap:4,
              background:'rgba(7,9,15,.82)', padding:'2px 7px',
              borderRadius:4, border:`1px solid ${z.style.border}`,
            }}>
              <div style={{width:5,height:5,borderRadius:'50%',background:z.style.border,flexShrink:0}}/>
              <span style={{
                fontSize:9, fontWeight:700, color:z.style.text,
                letterSpacing:.5, fontFamily:'var(--mono)', whiteSpace:'nowrap',
              }}>{z.label}</span>
            </div>
          </div>
        );
      })}

      {/* Loading overlay */}
      {loading && (
        <div style={{position:'absolute',inset:0,background:'rgba(7,9,15,.75)',
          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
          zIndex:10,backdropFilter:'blur(4px)'}}>
          <div style={{width:36,height:36,border:'3px solid var(--border2)',
            borderTop:'3px solid var(--blue-l)',borderRadius:'50%',
            animation:'spin 0.8s linear infinite',marginBottom:10}}/>
          <div style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>
            Loading {pair} {tf} data...
          </div>
          <div style={{fontSize:10,color:'var(--text3)',marginTop:4}}>Twelve Data API</div>
        </div>
      )}

      {/* Data source badge */}
      <div style={{position:'absolute',top:6,left:6,zIndex:5,
        display:'flex',alignItems:'center',gap:5,
        background:'rgba(7,9,15,.88)',backdropFilter:'blur(8px)',
        borderRadius:7,padding:'4px 9px',
        border:`1px solid ${dataSource==='LIVE'?'rgba(16,185,129,.3)':'rgba(245,158,11,.3)'}`}}>
        <span style={{width:6,height:6,borderRadius:'50%',display:'inline-block',
          background:dataSource==='LIVE'?'#10b981':'#f59e0b',
          animation:dataSource==='LIVE'?'pulse 1.5s ease-in-out infinite':'none'}}/>
        <span style={{fontSize:10,fontWeight:700,
          color:dataSource==='LIVE'?'#10b981':'#f59e0b',letterSpacing:.7}}>
          {dataSource==='LIVE'?'TWELVE DATA · REAL':'SIMULATION'}
        </span>
        <span style={{fontSize:11,fontWeight:800,fontFamily:'var(--mono)',color:'#e2e8f5',marginLeft:2}}>
          {pair}
        </span>
      </div>

      {/* LIVE badge */}
      <div style={{position:'absolute',top:6,right:70,zIndex:5,
        display:'flex',alignItems:'center',gap:5,
        background:'rgba(7,9,15,.88)',backdropFilter:'blur(6px)',
        borderRadius:7,padding:'4px 9px',border:'1px solid rgba(16,185,129,.3)'}}>
        <span style={{width:6,height:6,borderRadius:'50%',background:'#10b981',display:'inline-block',
          animation:'pulse 1.5s ease-in-out infinite'}}/>
        <span style={{fontSize:10,fontWeight:700,color:'#10b981',letterSpacing:.8}}>LIVE</span>
        {livePrice && <span style={{fontSize:12,fontWeight:800,fontFamily:'var(--mono)',color:'#e2e8f5',marginLeft:4}}>
          {livePrice.toFixed(pair.includes('JPY')||pair==='BTC/USD'||pair==='XAU/USD'?2:5)}
        </span>}
      </div>

      {/* Top-left: pair + price */}
      <div style={{
        position:'absolute', top:6, left:6, zIndex:5,
        background:'rgba(7,9,15,.85)', backdropFilter:'blur(8px)',
        borderRadius:8, padding:'5px 10px', border:'1px solid var(--border)',
        display:'flex', alignItems:'center', gap:8,
      }}>
        <span style={{fontSize:12,fontWeight:700,color:'var(--text2)'}}>{pair.replace('/','')}</span>
        {lastC && <span style={{fontSize:12,fontFamily:'var(--mono)',fontWeight:700,color:isBull?'var(--green)':'var(--red)'}}>
          {lastC.close.toFixed(dec)} <span style={{fontSize:10,opacity:.7}}>{isBull?'▲':'▼'}</span>
        </span>}
      </div>

      {/* TP/SL/Entry visual boxes overlay */}
      {tradeLines && (tradeLines.entry || tradeLines.sl || tradeLines.tp) && (() => {
        const eVal = parseFloat(tradeLines.entry);
        const slVal = parseFloat(tradeLines.sl);
        const tpVal = parseFloat(tradeLines.tp);
        const isBuy = tradeLines.dir !== 'SELL';
        const cfg3 = PIP_CFG[pair]||{pip:0.0001};
        const pDec3 = pair.includes('JPY')||['BTC/USD','ETH/USD','SOL/USD','US500','NAS100','GER40','XAU/USD','USOIL'].includes(pair)?2:5;
        return (
          <div style={{position:'absolute',top:44,right:72,zIndex:6,display:'flex',flexDirection:'column',gap:3}}>
            {tpVal && !isNaN(tpVal) && (
              <div style={{
                background:'rgba(16,185,129,.18)',border:'1px solid #10b981',
                borderRadius:6,padding:'4px 10px',display:'flex',alignItems:'center',gap:8,
                backdropFilter:'blur(4px)',minWidth:130,
              }}>
                <div style={{width:3,height:20,borderRadius:2,background:'#10b981',flexShrink:0}}/>
                <div>
                  <div style={{fontSize:9,color:'#10b981',fontWeight:700,letterSpacing:.5}}>TAKE PROFIT</div>
                  <div style={{fontSize:13,fontWeight:800,color:'#34d399',fontFamily:'var(--mono)'}}>{tpVal.toFixed(pDec3)}</div>
                </div>
                {eVal && !isNaN(eVal) && (
                  <div style={{fontSize:10,color:'#10b981',marginLeft:'auto',fontWeight:700}}>
                    +{Math.abs(tpVal-eVal).toFixed(pDec3)}
                  </div>
                )}
              </div>
            )}
            {eVal && !isNaN(eVal) && (
              <div style={{
                background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.4)',
                borderRadius:6,padding:'4px 10px',display:'flex',alignItems:'center',gap:8,
                backdropFilter:'blur(4px)',minWidth:130,
              }}>
                <div style={{width:3,height:20,borderRadius:2,background:'rgba(255,255,255,.7)',flexShrink:0}}/>
                <div>
                  <div style={{fontSize:9,color:'rgba(255,255,255,.6)',fontWeight:700,letterSpacing:.5}}>ENTRY</div>
                  <div style={{fontSize:13,fontWeight:800,color:'#e2e8f5',fontFamily:'var(--mono)'}}>{eVal.toFixed(pDec3)}</div>
                </div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.5)',marginLeft:'auto',fontWeight:700}}>
                  {isBuy?'▲ BUY':'▼ SELL'}
                </div>
              </div>
            )}
            {slVal && !isNaN(slVal) && (
              <div style={{
                background:'rgba(239,68,68,.18)',border:'1px solid #ef4444',
                borderRadius:6,padding:'4px 10px',display:'flex',alignItems:'center',gap:8,
                backdropFilter:'blur(4px)',minWidth:130,
              }}>
                <div style={{width:3,height:20,borderRadius:2,background:'#ef4444',flexShrink:0}}/>
                <div>
                  <div style={{fontSize:9,color:'#ef4444',fontWeight:700,letterSpacing:.5}}>STOP LOSS</div>
                  <div style={{fontSize:13,fontWeight:800,color:'#f87171',fontFamily:'var(--mono)'}}>{slVal.toFixed(pDec3)}</div>
                </div>
                {eVal && !isNaN(eVal) && (
                  <div style={{fontSize:10,color:'#ef4444',marginLeft:'auto',fontWeight:700}}>
                    -{Math.abs(slVal-eVal).toFixed(pDec3)}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })()}

      {/* Pattern alerts */}
      {patterns.length > 0 && (
        <div style={{position:'absolute',top:44,left:6,zIndex:6,display:'flex',flexDirection:'column',gap:3,maxWidth:200}}>
          {patterns.map((p,i)=>(
            <div key={i} onClick={()=>setSelPattern(selPattern===i?null:i)}
              style={{
                display:'flex',alignItems:'center',gap:6,
                background:p.dir==='bullish'?'rgba(16,185,129,.18)':'rgba(239,68,68,.18)',
                border:`1px solid ${p.dir==='bullish'?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'}`,
                borderRadius:6,padding:'4px 8px',cursor:'pointer',
                backdropFilter:'blur(6px)',
              }}>
              <span style={{fontSize:11}}>{p.dir==='bullish'?'▲':'▼'}</span>
              <span style={{fontSize:10,fontWeight:700,color:p.dir==='bullish'?'#10b981':'#ef4444'}}>{p.type}</span>
              <span style={{fontSize:9,color:'rgba(255,255,255,.5)',marginLeft:'auto'}}>{p.confidence}%</span>
            </div>
          ))}
        </div>
      )}

      {/* Selected pattern detail */}
      {selPattern!==null && patterns[selPattern] && (
        <div style={{
          position:'absolute',top:44,right:72,zIndex:7,
          background:'rgba(10,13,25,.95)',border:`1px solid ${patterns[selPattern].dir==='bullish'?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'}`,
          borderRadius:10,padding:12,maxWidth:220,backdropFilter:'blur(8px)',
          boxShadow:'0 8px 24px rgba(0,0,0,.5)',
        }}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:800,color:patterns[selPattern].dir==='bullish'?'#10b981':'#ef4444'}}>
              {patterns[selPattern].dir==='bullish'?'▲':'▼'} {patterns[selPattern].type}
            </span>
            <button onClick={()=>setSelPattern(null)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14}}>×</button>
          </div>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:8,lineHeight:1.5}}>{patterns[selPattern].desc}</div>
          {[
            {l:'Confidence', v:`${patterns[selPattern].confidence}%`, c:patterns[selPattern].confidence>75?'#10b981':'#f59e0b'},
            {l:'Entry',      v:patterns[selPattern].entry?.toFixed(isBTC||isIndex||isGold?2:5), c:'var(--text)'},
            {l:'Stop Loss',  v:patterns[selPattern].sl?.toFixed(isBTC||isIndex||isGold?2:5),    c:'#ef4444'},
            {l:'Take Profit',v:patterns[selPattern].tp?.toFixed(isBTC||isIndex||isGold?2:5),    c:'#10b981'},
          ].map(({l,v,c})=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid rgba(255,255,255,.05)'}}>
              <span style={{fontSize:10,color:'var(--text3)'}}>{l}</span>
              <span style={{fontSize:11,fontWeight:700,color:c,fontFamily:'var(--mono)'}}>{v}</span>
            </div>
          ))}
        </div>
      )}

      {/* Bullish/Bearish badge */}
      <div style={{position:'absolute', bottom:28, left:6, zIndex:5}}>
        <span style={{
          display:'inline-flex', alignItems:'center', gap:4,
          padding:'3px 8px', borderRadius:5, fontSize:10, fontWeight:700, letterSpacing:.5,
          background:isBull?'rgba(16,185,129,.12)':'rgba(239,68,68,.12)',
          color:isBull?'#10b981':'#ef4444'
        }}>{isBull?'▲ BULLISH':'▼ BEARISH'}</span>
      </div>

      {/* AOI Legend */}
      <div style={{
        position:'absolute', bottom:28, right:72, zIndex:5,

// ── CONF GAUGE ─────────────────────────────────────────────────────────────
function ConfGauge({pct,size=120}){
  const r=(size-14)/2,circ=2*Math.PI*r,dash=(pct/100)*circ;
  const {label,c}=confLabel(pct);
  return(
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2238" strokeWidth={7}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={7}
          strokeLinecap="round" strokeDasharray={`${dash} ${circ-dash}`}
          style={{transition:'stroke-dasharray .6s ease'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:1}}>
        <span style={{fontSize:size<90?18:22,fontWeight:800,color:c,fontFamily:'var(--mono)'}}>{pct}%</span>
        <span style={{fontSize:8,fontWeight:700,color:c,letterSpacing:1}}>{label}</span>
      </div>
    </div>
  );
}

// ── TF ANALYSIS ────────────────────────────────────────────────────────────
function TFAnalysis({checks}){
  const scores=TFS.map(tf=>{
    const cat=tfCat(tf);
    const t=ITEMS.reduce((s,it)=>checks[tf]?.[it.id]?s+it.w[cat]:s,0);
    const m=ITEMS.reduce((s,it)=>s+it.w[cat],0);
    return{tf,pct:Math.round((t/m)*100)};
  });
  const overall=Math.round(scores.reduce((s,x)=>s+x.pct,0)/scores.length);
  const {label,c}=confLabel(overall);
  return(
    <div className="card" style={{flex:1}}>
      <div className="card-hdr"><span style={{fontWeight:700}}>Timeframe Analysis</span><span className="tag tag-b" style={{fontSize:9}}>ACTIVE</span></div>
      <div style={{padding:'10px 14px'}}>
        {scores.map(({tf,pct})=>{
          const col=pct>=60?'var(--green)':pct>=30?'var(--gold)':'var(--red)';
          return(
            <div key={tf} style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <span style={{width:30,fontSize:11,fontWeight:600,color:'var(--text2)'}}>{tf}</span>
              <div className="prog-bar" style={{flex:1,height:5}}><div className="prog-fill" style={{width:`${pct}%`,background:col}}/></div>
              <span style={{fontSize:11,fontWeight:700,color:col,fontFamily:'var(--mono)',width:34,textAlign:'right'}}>{pct}%</span>
            </div>
          );
        })}
        <div style={{height:1,background:'var(--border)',margin:'8px 0'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:'var(--text2)'}}>Overall</span>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:22,fontWeight:800,color:c,fontFamily:'var(--mono)'}}>{overall}%</div>
            <div style={{fontSize:9,color:c,fontWeight:700,letterSpacing:1}}>{label}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── TRADE FORM ─────────────────────────────────────────────────────────────
function TradeForm({pair, strategy='swing', livePrice, onTradeChange, checks={}, tf='4H', savedPrediction, onPredictionSave}){
  const [acc,setAcc]=useState(1);
  const [dir,setDir]=useState('BUY');
  const [bal,setBal]=useState('');
  const [sl,setSl]=useState('');
  const [tp,setTp]=useState('');
  const [entry,setEntry]=useState('');
  const [rPct,setRPct]=useState('1');
  const [notes,setNotes]=useState('');
  const [predicting,setPredicting]=useState(false);
  const [prediction,setPrediction]=useState(savedPrediction||null);
  const [predErr,setPredErr]=useState('');

  // Sync with saved prediction when TF changes (via key prop reset)
  useEffect(()=>{ setPrediction(savedPrediction||null); },[savedPrediction]);

  const isJPY2   = pair.includes('JPY');
  const isIndex2 = ['US500','NAS100','GER40','UK100','JP225','AUS200','FRA40'].includes(pair);
  const isCrypto2= ['BTC/USD','ETH/USD','SOL/USD','XRP/USD','BNB/USD','ADA/USD','AVAX/USD','DOGE/USD','MATIC/USD','LTC/USD'].includes(pair);
  const isCommod2= ['XAU/USD','XAG/USD','USOIL','UKOIL','NGAS','COPPER'].includes(pair);
  const pDec     = isJPY2||isIndex2||isCrypto2||isCommod2 ? 2 : 5;
  const fmtP     = v => parseFloat(v).toFixed(pDec);

  const runPredict = async () => {
    if (!livePrice) return;
    setPredicting(true); setPrediction(null); setPredErr('');
    const activeChecks = Object.entries(checks).filter(([,v])=>v).map(([k])=>k);
    const cfg2 = PIP_CFG[pair]||{pip:0.0001,pv:10};
    // ATR scaled per timeframe
    const tfAtrMult = {
      '1m':0.06,'3m':0.12,'5m':0.18,'15m':0.28,'30m':0.42,'45m':0.52,
      '1H':0.7,'2H':1.0,'4H':1.5,'1D':3.2,'1W':6.5
    };
    const atr = (BASE_VOLS[pair]||0.001) * (tfAtrMult[tf]||1.0);
    const pipSz = PIP_CFG[pair]?.pip || 0.0001;
    const atrPips = Math.round(atr / pipSz);
    const isScalp = ['1m','3m','5m','15m','30m','45m'].includes(tf);

    const activeSignals = activeChecks.map(k=>{
      const item = ITEMS.find(x=>x.id===k);
      return item ? ('- '+item.label) : '';
    }).filter(Boolean).join(' | ');

    const prompt = 'You are ATHENA, an elite trading AI.\n\n' +
      'INSTRUMENT: ' + pair + '\n' +
      'TIMEFRAME: ' + tf + '\n' +
      'STRATEGY: ' + strategy + '\n' +
      'TIMEFRAME TYPE: ' + (isScalp ? 'SCALPING (' + tf + ') — tight SL ' + Math.round(atrPips*0.8) + '-' + Math.round(atrPips*1.5) + ' pips, TP ' + Math.round(atrPips*1.5) + '-' + Math.round(atrPips*2.5) + ' pips' : 'SWING — wider stops, larger targets') + '\n' +
      'ATR IN PIPS: ' + atrPips + ' pips' + '\n' +
      'CURRENT PRICE: ' + livePrice + '\n' +
      'TREND: ' + (checks.trend ? 'BULLISH' : 'BEARISH') + '\n' +
      'ACTIVE SIGNALS (' + activeChecks.length + '): ' + activeSignals + '\n' +
      'ATR ESTIMATE: ' + atr.toFixed(pDec) + ' (' + atrPips + ' pips)' + '\n\n' +
      'Provide Entry/SL/TP levels. Entry within 0.2 ATR of current price. ' +
      'SL 1-2 ATR from entry. TP minimum 1.5R, TP2 minimum 2.5R. Match trend direction.\n\n' +
      'Respond ONLY with JSON: {"direction":"BUY","entry":' + livePrice + ',"sl":0,"tp":0,"tp2":0,"rr":0,"rationale":"2 sentence analysis","confidence":75,"setup_quality":"A"}';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:400,
          messages:[{role:'user',content:prompt}]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==='text')?.text || '';
      const clean = text.replace(/```json|```/g,'').trim();
      const pred = JSON.parse(clean);
      // Apply prediction to form
      setDir(pred.direction||dir);
      setEntry(fmtP(pred.entry||livePrice));
      setSl(fmtP(pred.sl));
      setTp(fmtP(pred.tp));
      setPrediction(pred);
      if(onPredictionSave) onPredictionSave(pred);
      // Auto-update tradeLines for chart
      if(onTradeChange) onTradeChange({entry:String(pred.entry||''),sl:String(pred.sl||''),tp:String(pred.tp||''),dir:pred.direction||'BUY'});
    } catch(e) {
      // Fallback: calculate locally
      const isBuy = checks.trend !== false;
      const atr2   = atr;
      const slMult = isScalp ? 0.8 : 1.2;
      const tpMult = isScalp ? 1.5 : 2.0;
      const tp2Mult= isScalp ? 2.5 : 3.5;
      const entryP = parseFloat(fmtP(livePrice));
      const slP    = parseFloat(fmtP(isBuy ? livePrice - atr2*slMult  : livePrice + atr2*slMult));
      const tpP    = parseFloat(fmtP(isBuy ? livePrice + atr2*tpMult  : livePrice - atr2*tpMult));
      const tp2P   = parseFloat(fmtP(isBuy ? livePrice + atr2*tp2Mult : livePrice - atr2*tp2Mult));
      const rrCalc= parseFloat((Math.abs(tpP-entryP)/Math.abs(slP-entryP)).toFixed(2));
      const pred2 = {
        direction: isBuy?'BUY':'SELL',
        entry: entryP, sl: slP, tp: tpP, tp2: tp2P, rr: rrCalc,
        rationale: `Based on ${activeChecks.length} active confluence signals and ${isBuy?'bullish':'bearish'} trend. Local calculation used (Claude API unavailable).`,
        confidence: Math.min(85, 40 + activeChecks.length * 8),
        setup_quality: activeChecks.length >= 4 ? 'A' : activeChecks.length >= 3 ? 'B' : 'C'
      };
      setDir(pred2.direction);
      setEntry(fmtP(pred2.entry));
      setSl(fmtP(pred2.sl));
      setTp(fmtP(pred2.tp));
      setPrediction(pred2);
      if(onPredictionSave) onPredictionSave(pred2);
      if(onTradeChange) onTradeChange({entry:String(pred2.entry||''),sl:String(pred2.sl||''),tp:String(pred2.tp||''),dir:pred2.direction||'BUY'});
    }
    setPredicting(false);
  };

  useEffect(()=>{
    if(onTradeChange) onTradeChange({entry,sl,tp,dir});
  },[entry,sl,tp,dir]);
  
  const cfg=PIP_CFG[pair]||{pip:0.0001,pv:10};
  const lots=useMemo(()=>calcLots(bal,rPct,entry,sl,pair),[bal,rPct,entry,sl,pair]);
  const riskUSD=useMemo(()=>(parseFloat(bal)||0)*(parseFloat(rPct)||0)/100,[bal,rPct]);
  const slPips=entry&&sl?Math.round(Math.abs(parseFloat(entry)-parseFloat(sl))/cfg.pip):'—';
  const rr=useMemo(()=>{
    if(!entry||!sl||!tp)return 0;
    const r=Math.abs(parseFloat(entry)-parseFloat(sl));
    const rew=Math.abs(parseFloat(tp)-parseFloat(entry));
    return r?rew/r:0;
  },[entry,sl,tp]);
  
  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {/* Account */}
      <div>
        <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,letterSpacing:.5,marginBottom:6}}>ACCOUNT</div>
        <div style={{display:'flex',gap:6}}>
          {[1,2,3].map(n=>(
            <button key={n} onClick={()=>setAcc(n)}
              style={{flex:1,padding:'7px',borderRadius:8,
                border:`1px solid ${acc===n?'var(--blue-l)':'var(--border2)'}`,
                background:acc===n?'rgba(37,99,235,.15)':'var(--bg3)',
                color:acc===n?'var(--blue-l)':'var(--text2)',
                cursor:'pointer',fontFamily:'var(--font)',fontWeight:600,fontSize:12,transition:'all .15s'}}>
              Account {n}
            </button>
          ))}
        </div>
      </div>
      
      {/* Direction */}
      <div>
        <div style={{fontSize:11,color:'var(--text3)',fontWeight:700,letterSpacing:.5,marginBottom:6}}>DIRECTION</div>
        <div style={{display:'flex',gap:6}}>
          {[['BUY','▲','var(--green)','var(--green-bg)'],['SELL','▼','var(--red)','var(--red-bg)']].map(([d,icon,col,bg])=>(
            <button key={d} onClick={()=>setDir(d)}
              style={{flex:1,padding:'9px',borderRadius:8,
                border:`2px solid ${dir===d?col:'var(--border2)'}`,
                background:dir===d?bg:'var(--bg3)',color:dir===d?col:'var(--text2)',

                letterSpacing:.5,transition:'all .15s'}}>
              {icon} {d}

      </div>
      
      {/* ATHENA PREDICT BUTTON */}
      <div style={{
        background:'linear-gradient(135deg,rgba(37,99,235,.08),rgba(139,92,246,.08))',
        border:'2px solid rgba(139,92,246,.4)',borderRadius:14,padding:14,
        boxShadow:'0 0 24px rgba(124,58,237,.12)',
      }}>
        {/* Big predict button */}
        <button onClick={runPredict} disabled={predicting} style={{
          width:'100%', padding:'13px 20px', borderRadius:10, border:'none', cursor:'pointer',
