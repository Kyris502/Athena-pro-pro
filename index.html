*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07090f;--bg1:#0b0e1a;--bg2:#0f1421;--bg3:#141b2e;--bg4:#1a2238;
  --border:#1e2d42;--border2:#243550;
  --blue:#2563eb;--blue-l:#3b82f6;--blue-dim:rgba(59,130,246,.12);
  --green:#10b981;--green-dim:rgba(16,185,129,.1);
  --red:#ef4444;--red-dim:rgba(239,68,68,.1);

  --t1:#e2e8f5;--t2:#8892aa;--t3:#424d6a;
  --font:'Inter',sans-serif;
}
html,body,#root{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t1);font-family:var(--font);font-size:13px;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#2a3050;border-radius:3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;}
.input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--t1);font-family:var(--font);font-size:13px;padding:8px 11px;outline:none;transition:border .15s;}
.input:focus{border-color:var(--blue-l);}
.input::placeholder{color:var(--t3);}
.tog{position:relative;display:inline-block;width:38px;height:21px;flex-shrink:0;}
.tog input{opacity:0;width:0;height:0;}
.sld{position:absolute;cursor:pointer;inset:0;background:#1f2538;border:1px solid #2a3050;border-radius:21px;transition:.18s;}
.sld:before{content:"";position:absolute;width:15px;height:15px;left:2px;top:2px;background:#3a4560;border-radius:50%;transition:.18s;}
.tog input:checked+.sld{background:#2563eb;border-color:#2563eb;}
.tog input:checked+.sld:before{transform:translateX(17px);background:#fff;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 2s infinite;}
.fi{animation:fi .25s ease forwards;}

// ── HELPERS ──────────────────────────────────────────────────────────────

function pairDec(pair) {
  const isJPY = pair.includes('JPY');
  const isBig = ['BTC/USD','ETH/USD','SOL/USD','BNB/USD','XAU/USD','US500','NAS100','GER40','UK100','JP225','AUS200','FRA40','USOIL','UKOIL','XAG/USD'].includes(pair);
  return isJPY || isBig ? 2 : 5;
}

function isScalp(tf) { return SCAL_TFS.includes(tf); }
function tfCat(tf)   { return isScalp(tf) ? 's' : ['2H','4H'].includes(tf) ? 'm' : 'l'; }

function fmtSecs(s) {
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function confLabel(p) {
  if(p>=80) return {label:'STRONG',   c:'#3b82f6'};
  if(p>=60) return {label:'MODERATE', c:'#3b82f6'};
  if(p>=40) return {label:'FAIR',     c:'#f59e0b'};
  if(p>=20) return {label:'WEAK',     c:'#f97316'};
  return           {label:'NONE',     c:'#4a5570'};
}

function getSessionStatus() {
  const now = new Date();
  const h = now.getUTCHours() + now.getUTCMinutes()/60;
  return SESSIONS.map(s => {
    const act = s.e < s.s ? h >= s.s || h < s.e : h >= s.s && h < s.e;
    const dur = s.e > s.s ? s.e - s.s : (24 - s.s) + s.e;
    let rem = 0;
    if (act) {
      let en = s.e <= s.s ? s.e + 24 : s.e;
      let ch = h < s.s ? h + 24 : h;
      rem = Math.max(0, (en - ch) * 3600);
    }
    const prog = act && dur > 0 ? Math.min(100, 100 - (rem/(dur*3600))*100) : 0;
    return {...s, act, rem, prog};
  });
}

function isForexOpen() {
  const now = new Date();
  const day = now.getUTCDay();
  const t = now.getUTCHours()*60 + now.getUTCMinutes();
  if (day === 6) return false;
  if (day === 0 && t < 22*60) return false;
  if (day === 5 && t >= 22*60) return false;
  return true;
}

// ── LIVE PRICE HOOK ───────────────────────────────────────────────────────

let TD_KEY = '';
try { TD_KEY = localStorage.getItem('athena_td_key') || ''; } catch(e){}

function useLivePrice(pair) {
  const [price,  setPrice]  = useState(BASE_PRICES[pair] || 1);
  const [change, setChange] = useState(0);
  const [pct,    setPct]    = useState(0);
  const [src,    setSrc]    = useState('SIM');
  const refs = useRef({ws:null, sim:null, open: BASE_PRICES[pair] || 1});

  useEffect(() => {
    const base = BASE_PRICES[pair] || 1;
    refs.current.open = base;
    setPrice(base); setChange(0); setPct(0); setSrc('SIM');

    function startSim() {
      const isCrypto = ['BTC/USD','ETH/USD','SOL/USD','XRP/USD','BNB/USD','ADA/USD','AVAX/USD','DOGE/USD'].includes(pair);
      if (!isCrypto && !isForexOpen()) { setSrc('CLOSED'); return; }
      setSrc('SIM');
      const tv = TICK_VOL[pair] || 0.0001;
      let p = base, drift = 0, dt = 0;
      refs.current.sim = setInterval(() => {
        if (!isCrypto && !isForexOpen()) {
          clearInterval(refs.current.sim); setSrc('CLOSED'); return;
        }
        dt++;
        if (dt > 8 + Math.floor(Math.random()*12)) { drift=(Math.random()-.5)*tv*2; dt=0; }
        const dev = (p-base)/base;
        p = parseFloat((p+(Math.random()-.5+drift-dev*0.08)*tv).toFixed(pairDec(pair)));
        refs.current.price = p;
        const ch = p - refs.current.open;
        setPrice(p);
        setChange(parseFloat(ch.toFixed(5)));
        setPct(parseFloat(((ch/refs.current.open)*100).toFixed(3)));
      }, 700);
    }

    function connectBinance() {
      const sym = pair.replace('/','').toLowerCase()+'usdt'.replace('usdusdt','usdt');
      const wsym = pair === 'BTC/USD' ? 'btcusdt' :
                   pair === 'ETH/USD' ? 'ethusdt' :
                   pair === 'SOL/USD' ? 'solusdt' :
                   pair === 'BNB/USD' ? 'bnbusdt' : null;
      if (!wsym) { startSim(); return; }
      try {
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${wsym}@ticker`);
        refs.current.ws = ws;
        ws.onopen = () => setSrc('BINANCE');
        ws.onmessage = e => {
          const d = JSON.parse(e.data);
          const p = parseFloat(d.c);
          if (isNaN(p)) return;
          refs.current.open = parseFloat(d.o);
          setPrice(p); setChange(parseFloat(d.p)); setPct(parseFloat(d.P));
        };
        ws.onerror = () => startSim();
        ws.onclose = () => {};
      } catch { startSim(); }
    }

    function connectTD() {
      try {
        const ws = new WebSocket('wss://ws.twelvedata.com/v1/quotes/price?apikey=' + TD_KEY);
        refs.current.ws = ws;
        ws.onopen = () => {
          setSrc('LIVE');
          ws.send(JSON.stringify({action:'subscribe', params:{symbols: pair}}));
        };
        ws.onmessage = e => {
          const d = JSON.parse(e.data);
          if (d.event === 'price' && d.price) {
            const p = parseFloat(d.price);
            if (!isNaN(p) && p > 0) {
              setPrice(p);
              const ch = p - refs.current.open;
              setChange(parseFloat(ch.toFixed(5)));
              setPct(parseFloat(((ch/refs.current.open)*100).toFixed(3)));
            }
          }
          if (d.event === 'error') { ws.close(); startSim(); }
        };
        ws.onerror = () => startSim();
        // Also fetch current price via REST
        fetch(`https://api.twelvedata.com/price?symbol=${pair}&apikey=${TD_KEY}`)
          .then(r=>r.json()).then(d=>{
            if (d.price) { refs.current.open=parseFloat(d.price); setPrice(parseFloat(d.price)); }
          }).catch(()=>{});
      } catch { startSim(); }
    }

    const isCrypto = ['BTC/USD','ETH/USD','SOL/USD','XRP/USD','BNB/USD','ADA/USD','AVAX/USD','DOGE/USD'].includes(pair);
    if (TD_KEY)        connectTD();
    else if (isCrypto) connectBinance();
    else               startSim();

    return () => {
      if (refs.current.ws)  { refs.current.ws.close();             refs.current.ws = null; }
      if (refs.current.sim) { clearInterval(refs.current.sim);     refs.current.sim = null; }
    };
  }, [pair]);

  return {price, change, pct, src};
}

function Ring({pct, size=100}) {
  const r=(size-12)/2, circ=2*Math.PI*r;
  const {label,c}=confLabel(pct);
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1a2238" strokeWidth={9}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={c} strokeWidth={9}
          strokeLinecap="round" strokeDasharray={`${(pct/100)*circ} ${circ}`}
          style={{transition:'stroke-dasharray .5s'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontSize:size<90?16:20,fontWeight:800,color:c,lineHeight:1}}>{pct}%</span>
        <span style={{fontSize:7,fontWeight:700,color:c,letterSpacing:.8,marginTop:1}}>{label}</span>
      </div>
    </div>
  );
}

              <span style={{color:'var(--blue-l)'}}>kyris502.github.io/Athena-pro-pro/</span>
            </div>

          </div>
        </div>

          {eVal>0 && <div style={{background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.35)',borderRadius:6,padding:'3px 9px',display:'flex',alignItems:'center',gap:6,backdropFilter:'blur(6px)'}}>
            <span style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.6)',letterSpacing:.5}}>ENTRY</span>
            <span style={{fontSize:12,fontWeight:800,color:'#e2e8f5',fontFamily:'monospace'}}>{eVal.toFixed(dec)}</span>
          </div>}
          {slVal>0 && <div style={{background:'rgba(239,68,68,.2)',border:'1px solid var(--red)',borderRadius:6,padding:'3px 9px',display:'flex',alignItems:'center',gap:6,backdropFilter:'blur(6px)'}}>
            <span style={{fontSize:9,fontWeight:700,color:'var(--red)',letterSpacing:.5}}>SL</span>
            <span style={{fontSize:12,fontWeight:800,color:'#f87171',fontFamily:'monospace'}}>{slVal.toFixed(dec)}</span>
          </div>}
        </div>
      )}

      {/* Bottom: bullish/bearish */}
      <div style={{position:'absolute',bottom:28,left:6,zIndex:10,pointerEvents:'none'}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:5,
          fontSize:10,fontWeight:700,letterSpacing:.5,
          background:bull?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)',
          color:bull?'var(--green)':'var(--red)'}}>
          {bull?'▲ BULLISH':'▼ BEARISH'}
        </span>
      </div>

      {/* Scalp key levels */}
      {scalp && livePrice && (
        <div style={{position:'absolute',bottom:28,right:6,zIndex:10,pointerEvents:'none',
          background:'rgba(7,9,15,.9)',borderRadius:8,padding:'6px 10px',border:'1px solid var(--border)',backdropFilter:'blur(6px)'}}>
          <div style={{fontSize:9,color:'var(--t3)',fontWeight:700,letterSpacing:.7,marginBottom:3}}>KEY LEVELS</div>
          {(()=>{
            const isGold=pair==='XAU/USD', isIdx=['US500','NAS100','GER40','UK100','JP225','AUS200','FRA40'].includes(pair);
            const isCr=['BTC/USD','ETH/USD','SOL/USD','BNB/USD'].includes(pair);
            const step=isGold?5:isIdx?50:isCr?100:pair.includes('JPY')?0.5:0.0050;
            const r=Math.ceil(livePrice/step)*step, s=Math.floor(livePrice/step)*step;
            return (<>
              <div style={{display:'flex',gap:5,alignItems:'center',marginBottom:2}}>
                <div style={{width:5,height:5,borderRadius:'50%',background:'var(--red)'}}/>
                <span style={{fontSize:9,color:'var(--t3)',fontWeight:700}}>R</span>
                <span style={{fontSize:10,color:'#f87171',fontFamily:'monospace',fontWeight:700}}>{r.toFixed(dec)}</span>
              </div>
              <div style={{display:'flex',gap:5,alignItems:'center'}}>
                <div style={{width:5,height:5,borderRadius:'50%',background:'var(--green)'}}/>
                <span style={{fontSize:9,color:'var(--t3)',fontWeight:700}}>S</span>
                <span style={{fontSize:10,color:'#34d399',fontFamily:'monospace',fontWeight:700}}>{s.toFixed(dec)}</span>
              </div>
            </>);
          })()}
        </div>
      )}
    </div>
  );
}

// ── CHECKLIST PANEL ───────────────────────────────────────────────────────

function ChecklistPanel({tf, checks, onToggle}) {
  const cat   = tfCat(tf);
  const score = ITEMS.reduce((s,it)=> checks[it.id] ? s+it.w[cat] : s, 0);
  const max   = ITEMS.reduce((s,it)=> s+it.w[cat], 0);
  const pct   = Math.round((score/max)*100);
  const bull  = !!checks['trend'];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'var(--bg1)',borderLeft:'1px solid var(--border)'}}>
      <div style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:9,color:'var(--t3)',fontWeight:700,letterSpacing:1,marginBottom:2}}>ACTIVE CHECKLIST</div>
          <div style={{fontSize:16,fontWeight:700}}>{tf==='1D'?'DAILY':tf==='1W'?'WEEKLY':tf}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:9,color:'var(--t3)',marginBottom:3}}>confluence</div>
          <Ring pct={pct} size={64}/>
        </div>
      </div>

      <div style={{flex:1,overflowY:'auto'}}>
        {ITEMS.map(it => {
          const on  = !!checks[it.id];
          const w   = it.w[cat];
          const dis = it.id==='psych' && !['1D','1W'].includes(tf);
          return (
            <div key={it.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',
              borderBottom:'1px solid var(--border)',
              background:on&&!dis?'rgba(37,99,235,.04)':'transparent',opacity:dis?.5:1}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,color:on&&!dis?'var(--t1)':'var(--t2)',lineHeight:1.3,marginBottom:2}}>{it.label}</div>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:.5,color:dis?'var(--t3)':it.mode==='AUTO'?'var(--blue-l)':'var(--t3)'}}>{dis?'ENABLED ON D':it.mode}</div>
              </div>
              <span style={{fontSize:11,fontWeight:700,color:on&&!dis?'#22c55e':'var(--t3)',minWidth:30,textAlign:'right'}}>+{w}%</span>
              <Toggle checked={on&&!dis} onChange={v=>!dis&&onToggle(it.id,v)}/>
            </div>
          );
        })}
      </div>

      <div style={{padding:'8px 14px',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
        <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:5,fontSize:10,fontWeight:700,letterSpacing:.5,
          background:bull?'rgba(16,185,129,.1)':'rgba(239,68,68,.1)',color:bull?'var(--green)':'var(--red)'}}>
          {bull?'▲ BULLISH':'▼ BEARISH'}
        </span>
        <span style={{fontSize:10,color:'var(--t3)',marginLeft:'auto'}}>{score}/{max}</span>
      </div>
    </div>
  );
}

// ── TRADE FORM ────────────────────────────────────────────────────────────

function TradeForm({pair, tf, livePrice, checks, onTradeChange}) {
  const [acc,   setAcc]   = useState(1);
  const [dir,   setDir]   = useState('BUY');
  const [bal,   setBal]   = useState('');
  const [sl,    setSl]    = useState('');
  const [tp,    setTp]    = useState('');
  const [entry, setEntry] = useState('');
  const [rPct,  setRPct]  = useState('1');
  const [pred,  setPred]  = useState(null);
  const [loading,setLoading] = useState(false);

  const dec = pairDec(pair);
  const scalp = isScalp(tf);
  const cfg = PIP_CFG[pair] || {pip:0.0001,pv:10};

  useEffect(() => { if(onTradeChange) onTradeChange({entry,sl,tp,dir}); }, [entry,sl,tp,dir]);

  const lots = useMemo(() => {
    if(!bal||!rPct||!entry||!sl) return 0;
    const ra = parseFloat(bal)*(parseFloat(rPct)/100);
    const pips = Math.abs(parseFloat(entry)-parseFloat(sl))/cfg.pip;
    return pips ? ra/(pips*cfg.pv) : 0;
  },[bal,rPct,entry,sl]);

  const rr = useMemo(()=>{
    if(!entry||!sl||!tp) return 0;
    const r=Math.abs(parseFloat(entry)-parseFloat(sl));
    const rew=Math.abs(parseFloat(tp)-parseFloat(entry));
    return r ? rew/r : 0;
  },[entry,sl,tp]);

  const riskUSD=(parseFloat(bal)||0)*(parseFloat(rPct)||0)/100;
  const slPips=entry&&sl?((Math.abs(parseFloat(entry)-parseFloat(sl)))/cfg.pip).toFixed(1):'—';

  async function runPredict() {
    if(!livePrice) return;
    setLoading(true); setPred(null);
    const activeSignals = Object.entries(checks).filter(([,v])=>v).map(([k])=>{
      const it=ITEMS.find(x=>x.id===k);
      return it?it.label:'';
    }).filter(Boolean).join(', ');
    const tfMult={'1m':0.06,'3m':0.12,'5m':0.18,'15m':0.28,'30m':0.42,'45m':0.52,'1H':0.7,'2H':1.0,'4H':1.5,'1D':3.2,'1W':6.5};
    const atr=(TICK_VOL[pair]||0.0001)*60*(tfMult[tf]||1);
    const isBuy=checks.trend!==false;
    const fmtP=v=>parseFloat(v).toFixed(dec);
    try {
      const prompt='You are ATHENA trading AI.\nPAIR:'+pair+'\nTF:'+tf+'\nPRICE:'+livePrice+'\nTREND:'+(checks.trend?'BULLISH':'BEARISH')+'\nSIGNALS:'+activeSignals+'\nATR:'+atr.toFixed(dec)+'\n'+(scalp?'SCALP mode: tight SL/TP':'SWING mode: wider SL/TP')+'\n\nReply ONLY with JSON:{"direction":"BUY","entry":'+livePrice+',"sl":0,"tp":0,"tp2":0,"rr":1.5,"rationale":"brief analysis","confidence":70,"setup_quality":"B"}';
      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,messages:[{role:'user',content:prompt}]})
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==='text')?.text||'';
      const p = JSON.parse(text.replace(/```json|```/g,'').trim());
      setDir(p.direction||dir);
      setEntry(fmtP(p.entry||livePrice));
      setSl(fmtP(p.sl));
      setTp(fmtP(p.tp));
      setPred(p);
      if(onTradeChange) onTradeChange({entry:String(p.entry||''),sl:String(p.sl||''),tp:String(p.tp||''),dir:p.direction||'BUY'});
    } catch {
      const slM=scalp?.8:1.2, tpM=scalp?1.5:2.0;
      const e=parseFloat(fmtP(livePrice));
      const s=parseFloat(fmtP(isBuy?livePrice-atr*slM:livePrice+atr*slM));
      const t=parseFloat(fmtP(isBuy?livePrice+atr*tpM:livePrice-atr*tpM));
      const t2=parseFloat(fmtP(isBuy?livePrice+atr*(tpM*1.7):livePrice-atr*(tpM*1.7)));
      const rrC=parseFloat((Math.abs(t-e)/Math.abs(s-e)).toFixed(2));
      const p2={direction:isBuy?'BUY':'SELL',entry:e,sl:s,tp:t,tp2:t2,rr:rrC,
        rationale:(scalp?'Scalp setup':'Swing setup')+' on '+tf+'. '+(isBuy?'Bullish':'Bearish')+' bias. ATR-based levels.',
        confidence:Math.min(85,35+Object.values(checks).filter(Boolean).length*8),
        setup_quality:Object.values(checks).filter(Boolean).length>=4?'A':Object.values(checks).filter(Boolean).length>=3?'B':'C'};
      setDir(p2.direction); setEntry(fmtP(p2.entry)); setSl(fmtP(p2.sl)); setTp(fmtP(p2.tp));
      setPred(p2);
      if(onTradeChange) onTradeChange({entry:String(p2.entry||''),sl:String(p2.sl||''),tp:String(p2.tp||''),dir:p2.direction});
    }
    setLoading(false);
  }

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:520}}>
      {/* PREDICT BUTTON */}
      <div style={{background:'linear-gradient(135deg,rgba(37,99,235,.08),rgba(168,85,247,.08))',
        border:'2px solid rgba(168,85,247,.35)',borderRadius:12,padding:12}}>
        <button onClick={runPredict} disabled={loading} style={{
          width:'100%',padding:'12px',borderRadius:9,border:'none',cursor:'pointer',
          fontFamily:'var(--font)',fontWeight:800,fontSize:14,letterSpacing:.3,
          background:loading?'var(--bg4)':'linear-gradient(135deg,#1d4ed8,#7c3aed)',
          color:loading?'var(--t3)':'#fff',display:'flex',alignItems:'center',
          justifyContent:'center',gap:8,transition:'all .2s',opacity:loading?.6:1,
          boxShadow:loading?'none':'0 4px 16px rgba(124,58,237,.35)',
          marginBottom:pred?10:0}}>
          {loading
            ? <><span style={{width:14,height:14,border:'2px solid rgba(255,255,255,.3)',borderTop:'2px solid #fff',borderRadius:'50%',animation:'spin .7s linear infinite',display:'inline-block'}}/> Analyzing...</>
            : <><span style={{fontSize:16}}>⊕</span> ATHENA AI PREDICT · {tf} <span style={{fontSize:11,opacity:.8}}>{scalp?'SCALP':'SWING'}</span></>}
        </button>

        {pred && (
          <div style={{animation:'fi .3s ease'}}>
            <div style={{display:'flex',gap:6,marginBottom:8}}>
              {[{l:'QUALITY',v:pred.setup_quality,c:pred.setup_quality==='A'?'var(--green)':pred.setup_quality==='B'?'var(--gold)':'var(--red)'},
                {l:'CONFIDENCE',v:pred.confidence+'%',c:'var(--purple)'},
                {l:'R:R',v:'1:'+parseFloat(pred.rr).toFixed(1),c:'var(--green)'}
              ].map(({l,v,c})=>(
                <div key={l} style={{flex:1,background:'var(--bg3)',borderRadius:8,padding:'7px 8px',border:'1px solid var(--border2)',textAlign:'center'}}>
                  <div style={{fontSize:8,color:'var(--t3)',marginBottom:2,fontWeight:700}}>{l}</div>
                  <div style={{fontSize:18,fontWeight:900,color:c}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8}}>
              {[{l:'ENTRY',v:pred.entry?.toFixed(dec),c:'#e2e8f5',bg:'rgba(255,255,255,.04)'},
                {l:'STOP LOSS',v:pred.sl?.toFixed(dec),c:'#f87171',bg:'rgba(239,68,68,.08)'},
                {l:'TAKE PROFIT',v:pred.tp?.toFixed(dec),c:'#34d399',bg:'rgba(16,185,129,.08)'}
              ].map(({l,v,c,bg})=>(
                <div key={l} style={{background:bg,borderRadius:7,padding:'7px 8px',textAlign:'center',border:`1px solid ${c}22`}}>
                  <div style={{fontSize:8,color:'var(--t3)',fontWeight:700,letterSpacing:.5,marginBottom:2}}>{l}</div>
                  <div style={{fontSize:11,fontWeight:800,color:c,fontFamily:'monospace'}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{background:'rgba(168,85,247,.07)',borderRadius:8,padding:'8px 10px',
              border:'1px solid rgba(168,85,247,.2)',fontSize:11,color:'var(--t2)',lineHeight:1.55}}>
              <span style={{fontSize:9,fontWeight:700,color:'var(--purple)',display:'block',marginBottom:2}}>⊕ ATHENA</span>
              {pred.rationale}
            </div>
          </div>
        )}
      </div>

      {/* Account */}
      <div>
        <div style={{fontSize:10,color:'var(--t3)',fontWeight:700,marginBottom:6,letterSpacing:.5}}>ACCOUNT</div>
        <div style={{display:'flex',gap:6}}>
          {[1,2,3].map(n=>(
            <button key={n} onClick={()=>setAcc(n)} style={{flex:1,padding:'8px',borderRadius:8,cursor:'pointer',
              fontFamily:'var(--font)',fontWeight:600,fontSize:13,transition:'all .15s',
              border:`1px solid ${acc===n?'var(--blue-l)':'var(--border2)'}`,
              background:acc===n?'var(--blue-dim)':'var(--bg3)',
              color:acc===n?'var(--blue-l)':'var(--t2)'}}>Account {n}</button>
          ))}
        </div>
      </div>

      {/* Direction */}
      <div>
        <div style={{fontSize:10,color:'var(--t3)',fontWeight:700,marginBottom:6,letterSpacing:.5}}>DIRECTION</div>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setDir('BUY')} style={{flex:1,padding:'10px',borderRadius:8,cursor:'pointer',
            fontFamily:'var(--font)',fontWeight:800,fontSize:14,transition:'all .15s',
            border:`2px solid ${dir==='BUY'?'var(--green)':'var(--border2)'}`,
            background:dir==='BUY'?'var(--green-dim)':'var(--bg3)',color:dir==='BUY'?'var(--green)':'var(--t2)'}}>▲ BUY</button>
          <button onClick={()=>setDir('SELL')} style={{flex:1,padding:'10px',borderRadius:8,cursor:'pointer',
            fontFamily:'var(--font)',fontWeight:800,fontSize:14,transition:'all .15s',
            border:`2px solid ${dir==='SELL'?'var(--red)':'var(--border2)'}`,
            background:dir==='SELL'?'var(--red-dim)':'var(--bg3)',color:dir==='SELL'?'var(--red)':'var(--t2)'}}>▼ SELL</button>
        </div>
      </div>

      {/* Balance */}
      <div>
        <div style={{fontSize:10,color:'var(--t3)',fontWeight:700,marginBottom:6,letterSpacing:.5}}>ACCOUNT BALANCE (USD)</div>
        <input className="input" type="number" placeholder="e.g. 10000" value={bal} onChange={e=>setBal(e.target.value)}/>
      </div>

      {/* Trade Params */}
      <div>
        <div style={{fontSize:10,color:'var(--t3)',fontWeight:700,marginBottom:8,letterSpacing:.5}}>TRADE PARAMETERS</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Stop Loss *</div>
            <input className="input" type="number" step="0.00001" placeholder="0.00" value={sl} onChange={e=>setSl(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Take Profit *</div>
            <input className="input" type="number" step="0.00001" placeholder="0.00" value={tp} onChange={e=>setTp(e.target.value)}/>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Entry Price *</div>
            <div style={{position:'relative'}}>
              <input className="input" type="number" step="0.00001" placeholder="0.00" value={entry} onChange={e=>setEntry(e.target.value)} style={{paddingRight:60}}/>
              {livePrice && <button onClick={()=>setEntry(livePrice.toFixed(dec))} style={{position:'absolute',right:0,top:0,bottom:0,padding:'0 8px',background:'var(--blue-dim)',border:'none',borderLeft:'1px solid var(--border2)',borderRadius:'0 7px 7px 0',color:'var(--blue-l)',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'var(--font)'}}>LIVE</button>}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Risk % *</div>
            <div style={{position:'relative'}}>
              <input className="input" type="number" step="0.1" min="0.1" max="10" placeholder="1" value={rPct} onChange={e=>setRPct(e.target.value)} style={{paddingRight:44}}/>
              <span style={{position:'absolute',right:0,top:0,bottom:0,display:'flex',alignItems:'center',paddingRight:8,paddingLeft:6,fontSize:10,fontWeight:700,color:'var(--blue-l)',background:'var(--blue-dim)',borderRadius:'0 7px 7px 0',borderLeft:'1px solid var(--border2)'}}>USD</span>
            </div>
          </div>
        </div>
      </div>

      {/* Position Size */}
      <div style={{background:'var(--bg3)',border:`1px solid ${lots>0?'var(--blue-l)':'var(--border2)'}`,borderRadius:10,padding:12,transition:'border .3s'}}>
        <div style={{fontSize:9,color:'var(--t3)',fontWeight:700,letterSpacing:.7,marginBottom:8}}>POSITION SIZE</div>
        <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:8}}>
          <div>
            <div style={{fontSize:9,color:'var(--t3)',marginBottom:2}}>Lot Size</div>
            <div style={{fontSize:34,fontWeight:800,color:lots>0?'var(--blue-l)':'var(--t3)',lineHeight:1,fontFamily:'monospace'}}>{lots>0?lots.toFixed(2):'—'}</div>
            <div style={{fontSize:9,color:'var(--t3)',marginTop:2}}>standard lots</div>
          </div>
          <div style={{textAlign:'right',display:'flex',flexDirection:'column',gap:4}}>
            <div>
              <div style={{fontSize:9,color:'var(--t3)'}}>Risk Amount</div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--red)',fontFamily:'monospace'}}>{riskUSD>0?'$'+riskUSD.toFixed(2):'—'}</div>
            </div>
            <div>
              <div style={{fontSize:9,color:'var(--t3)'}}>SL Distance</div>
              <div style={{fontSize:12,fontWeight:700,color:'var(--t2)',fontFamily:'monospace'}}>{slPips} pips</div>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:9,color:'var(--t3)'}}>R:R</div>

function EcoModal({onClose}) {
  const [events,setEvents]=useState(ECO_FALLBACK);
  const [loading,setLoading]=useState(true);
  const [filt,setFilt]=useState('all');
  const [hidePast,setHidePast]=useState(false);

  useEffect(()=>{
    const proxies=['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
    const url='https://nfs.faireconomy.media/ff_calendar_thisweek.json';
    let done=false;
    proxies.forEach(proxy=>{
      if(done) return;
      fetch(proxy+encodeURIComponent(url)).then(r=>r.json()).then(d=>{
        if(done||!Array.isArray(d)||!d.length) return;
        done=true;
        setEvents(d.map(e=>({
          t: e.date?new Date(e.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'}):'—',
          date: e.date,
          ccy: e.country||'—',
          imp: e.impact==='High'?'high':e.impact==='Medium'?'medium':'low',
          ev: e.title||'—',
          prev: e.previous||'—',
          fore: e.forecast||'—',
          actual: e.actual||null,
        })));
        setLoading(false);
      }).catch(()=>setLoading(false));
    });
    setTimeout(()=>setLoading(false),4000);
  },[]);

  const now=new Date();
  const filtered=events.filter(e=>{
    if(filt!=='all'&&e.imp!==filt) return false;
    if(hidePast&&e.date&&new Date(e.date)<now) return false;
    return true;
  });
  const iC={high:'#ef4444',medium:'#f59e0b',low:'#3b82f6'};
  const iB={high:'rgba(239,68,68,.12)',medium:'rgba(245,158,11,.12)',low:'rgba(59,130,246,.12)'};

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,backdropFilter:'blur(4px)'}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:14,width:680,maxWidth:'96vw',maxHeight:'85vh',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <div style={{padding:'14px 18px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
          <div>
            <span style={{fontWeight:800,fontSize:15}}>📅 Economic Calendar</span>
            {!loading&&<span style={{fontSize:10,color:'var(--green)',marginLeft:10}}>● LIVE</span>}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--t3)',fontSize:22,cursor:'pointer'}}>×</button>
        </div>
        <div style={{padding:'8px 18px',borderBottom:'1px solid var(--border)',display:'flex',gap:6,alignItems:'center',flexShrink:0,flexWrap:'wrap'}}>
          {['all','high','medium','low'].map(f=>(
            <button key={f} onClick={()=>setFilt(f)} style={{
              padding:'4px 12px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'var(--font)',fontWeight:600,fontSize:11,
              background:filt===f?'var(--blue)':'var(--bg3)',color:filt===f?'#fff':'var(--t3)'}}>
              {f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}
            </button>
          ))}
          <label style={{display:'flex',alignItems:'center',gap:6,marginLeft:'auto',fontSize:11,color:'var(--t2)',cursor:'pointer'}}>
            Hide Past <Toggle checked={hidePast} onChange={setHidePast}/>
          </label>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {filtered.map((e,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'55px 40px 1fr 70px 70px',gap:10,padding:'10px 18px',
              borderBottom:'1px solid var(--border)',alignItems:'center',
              opacity:e.date&&new Date(e.date)<now?.6:1}}>
              <span style={{fontSize:11,color:'var(--t2)',fontFamily:'monospace'}}>{e.t}</span>
              <span style={{fontSize:10,fontWeight:700,padding:'2px 6px',borderRadius:4,textAlign:'center',background:iB[e.imp],color:iC[e.imp]}}>{e.ccy}</span>
              <div>
                <div style={{fontSize:12,fontWeight:600}}>{e.ev}</div>
                <span style={{fontSize:8,fontWeight:700,padding:'1px 5px',borderRadius:3,background:iB[e.imp],color:iC[e.imp],letterSpacing:.5}}>{e.imp.toUpperCase()}</span>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--t3)',marginBottom:1}}>PREV</div>
                <div style={{fontSize:11,fontFamily:'monospace',color:'var(--t2)'}}>{e.prev}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:9,color:'var(--t3)',marginBottom:1}}>FORECAST</div>
                <div style={{fontSize:11,fontFamily:'monospace',fontWeight:700,color:e.actual?'var(--green)':'var(--gold)'}}>{e.actual||e.fore}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── PAIR SEARCH DROPDOWN ──────────────────────────────────────────────────

function PairDropdown({pair, onSelect, onClose}) {
  const [q,setQ]=useState('');
  const filtered=useMemo(()=>{
    if(!q.trim()) return PAIR_GROUPS;
    const qu=q.toUpperCase();
    const r={};
    Object.entries(PAIR_GROUPS).forEach(([grp,pairs])=>{
      const m=pairs.filter(p=>p.includes(qu));
      if(m.length) r[grp]=m;
    });
    return r;
  },[q]);

  return(
    <div style={{position:'absolute',top:'calc(100%+5px)',right:0,background:'var(--bg2)',
      border:'1px solid var(--border2)',borderRadius:12,zIndex:300,width:230,
      boxShadow:'0 12px 40px rgba(0,0,0,.7)',marginTop:4,display:'flex',flexDirection:'column',maxHeight:'75vh'}}>
      <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <input autoFocus className="input" placeholder="Search pair... (e.g. XAU)" value={q} onChange={e=>setQ(e.target.value)} style={{fontSize:13}}/>
      </div>
      <div style={{overflowY:'auto',flex:1}}>
        {Object.entries(filtered).map(([grp,pairs])=>(
          <div key={grp}>
            <div style={{padding:'5px 12px 3px',fontSize:9,fontWeight:800,color:'var(--t3)',
              letterSpacing:1,background:'var(--bg1)',position:'sticky',top:0,
              borderBottom:'1px solid var(--border)'}}>
              {grp.toUpperCase()}
            </div>
            {pairs.map(p=>(
              <div key={p} onClick={()=>{onSelect(p);onClose();}} style={{
                padding:'8px 12px',cursor:'pointer',fontSize:13,fontWeight:600,
                background:pair===p?'var(--blue-dim)':'transparent',
                color:pair===p?'var(--blue-l)':'var(--t2)',
                borderLeft:pair===p?'3px solid var(--blue-l)':'3px solid transparent',
                borderBottom:'1px solid rgba(255,255,255,.02)',
              }}
              onMouseEnter={e=>{if(p!==pair)e.currentTarget.style.background='rgba(255,255,255,.03)'}}
              onMouseLeave={e=>{if(p!==pair)e.currentTarget.style.background='transparent'}}>
                {p}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

          </div>

          <div style={{flex:1,display:'flex',minHeight:0,overflow:'hidden'}}>
            <div style={{flex:1,position:'relative',overflow:'hidden'}}>
              {chartView==='chart' && <TVChart key={pair+'_'+tf} pair={pair} tf={tf} livePrice={livePrice} tradeLines={tradeLines}/>}
              {chartView==='orderflow' && (
                <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',
                  background:'var(--bg1)',flexDirection:'column',gap:12}}>
                  <span style={{fontSize:24}}>⚡</span>
                  <div style={{fontSize:14,fontWeight:700,color:'var(--t1)'}}>Order Flow · {pair} · {tf}</div>
                  <div style={{fontSize:12,color:'var(--t3)'}}>Volume delta analysis — coming soon</div>
                </div>
              )}
              {chartView==='confluence' && (
                <div style={{width:'100%',height:'100%',overflowY:'auto',padding:14,background:'var(--bg1)'}}>
                  <div style={{display:'flex',justifyContent:'center',marginBottom:14}}>
                    {(()=>{
                      const tfsAll=[...SCAL_TFS,...SWING_TFS];
                      const rows=tfsAll.map(t=>{const cat=tfCat(t);const sc=ITEMS.reduce((s,it)=>checks[t]?.[it.id]?s+it.w[cat]:s,0);const mx=ITEMS.reduce((s,it)=>s+it.w[cat],0);return Math.round((sc/mx)*100);});
                      const ov=Math.round(rows.reduce((a,b)=>a+b,0)/rows.length);
                      return <Ring pct={ov} size={110}/>;
                    })()}
                  </div>
                  {ITEMS.map(it=>{
                    const on=!!checks[tf]?.[it.id];
                    const cat=tfCat(tf);
                    return(
                      <div key={it.id} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 8px',marginBottom:3,
                        borderRadius:7,background:on?'rgba(16,185,129,.06)':'transparent',
                        border:on?'1px solid rgba(16,185,129,.15)':'1px solid transparent'}}>
                        <span style={{fontSize:13}}>{on?'✅':'⬜'}</span>
                        <span style={{flex:1,fontSize:12,color:on?'var(--t1)':'var(--t3)',fontWeight:on?600:400}}>{it.label}</span>
                        <span style={{fontSize:11,fontWeight:700,color:on?'#22c55e':'var(--t3)'}}>+{it.w[cat]}%</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            {!isMobile && (
              <div style={{width:280,flexShrink:0,overflow:'hidden'}}>
                <ChecklistPanel tf={tf} checks={checks[tf]||{}} onToggle={toggleItem}/>
              </div>
            )}
          </div>
        </div>

        {/* Bottom section */}
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,borderTop:'1px solid var(--border)'}}>
          {/* Tab bar */}
          <div style={{height:38,flexShrink:0,display:'flex',alignItems:'center',gap:2,padding:'0 10px',
            background:'var(--bg1)',borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
            {(isMobile
              ? [{id:'trade',label:'💼 Trade'},{id:'checklist',label:'✅ List'},{id:'analysis',label:'📊 Analysis'}]
              : [{id:'trade',label:'💼 Trade Setup'},{id:'analysis',label:'📊 Analysis'},{id:'orderflow',label:'⚡ Order Flow'}]
            ).map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:'4px 13px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'var(--font)',fontSize:12,fontWeight:600,
                background:tab===t.id?'var(--blue)':'transparent',color:tab===t.id?'#fff':'var(--t3)',transition:'all .12s',
                flexShrink:0}}>
                {t.label}
              </button>
            ))}
            <div style={{flex:1}}/>
            <span style={{fontSize:10,color:'var(--t3)',fontFamily:'monospace',flexShrink:0}}>{utcStr}</span>
            {sessions.find(s=>s.act) && (
              <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:4,background:'rgba(16,185,129,.1)',color:'var(--green)',marginLeft:6,flexShrink:0}}>
                {sessions.find(s=>s.act).n}
              </span>
            )}
          </div>

          {/* Tab content */}
          <div style={{flex:1,overflowY:'auto',padding:12}}>
            {tab==='trade' && (
              <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'minmax(0,500px) 1fr',gap:12,maxWidth:1000}}>
                <TradeForm pair={pair} tf={tf} livePrice={livePrice} checks={checks[tf]||{}} onTradeChange={setTradeLines}/>
                <SessionsPanel sessions={sessions} utc={utcStr} mktOpen={mktOpen}/>
              </div>
            )}
            {tab==='checklist' && isMobile && (
              <ChecklistPanel tf={tf} checks={checks[tf]||{}} onToggle={toggleItem}/>
            )}
            {tab==='analysis' && (
              <AnalysisTab checks={checks} tf={tf}/>
            )}
            {tab==='orderflow' && (
              <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:600}}>
                <div className="card" style={{padding:20,textAlign:'center'}}>
                  <div style={{fontSize:20,marginBottom:8}}>⚡</div>
                  <div style={{fontSize:14,fontWeight:700,marginBottom:6}}>Order Flow · {pair}</div>
                  <div style={{fontSize:12,color:'var(--t3)'}}>Advanced delta analysis — use the Order Flow tab in the chart area above</div>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Footer */}
      <div style={{height:28,flexShrink:0,background:'var(--bg1)',borderTop:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
        <div style={{width:16,height:16,borderRadius:4,background:'linear-gradient(135deg,var(--blue),#1e40af)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9}}>⊕</div>
        <span style={{fontWeight:800,fontSize:11,letterSpacing:1,background:'linear-gradient(135deg,#60a5fa,#3b82f6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>ATHENA PRO</span>
      </div>

      {/* Modals */}
      {showEco && <EcoModal onClose={()=>setShowEco(false)}/>}

      {/* Close dropdowns */}
      {(showStratD||showPairD) && (
        <div style={{position:'fixed',inset:0,zIndex:99}} onClick={()=>{setShowStratD(false);setShowPairD(false);}}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
