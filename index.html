// ── ORDER FLOW ─────────────────────────────────────────────────────────────
function OrderFlowPanel({pair}){
  const bars=useMemo(()=>{
    const rand=seededRand(pair.split('').reduce((a,c)=>a+c.charCodeAt(0),0)+42);
    return Array.from({length:20},(_,i)=>({
      buy:Math.round(500+rand()*2000),sell:Math.round(500+rand()*2000)
    }));
  },[pair]);
  const maxV=Math.max(...bars.map(b=>b.buy+b.sell));
  const totB=bars.reduce((s,b)=>s+b.buy,0);
  const totS=bars.reduce((s,b)=>s+b.sell,0);
  const bPct=Math.round(totB/(totB+totS)*100);
  const cvd=bars.reduce((acc,b,i)=>{acc.push((i>0?acc[i-1]:0)+(b.buy-b.sell));return acc;},[]);
  const lastCvd=cvd[cvd.length-1];
  const isBuyBias=bPct>=50;
  
  return(
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      {/* Volume split */}
      <div className="card">
        <div className="card-hdr">
          <span style={{fontWeight:700}}>📊 Order Flow · {pair}</span>
          <span className="tag tag-b" style={{fontSize:9}}>
            <span className="pulse" style={{width:5,height:5,borderRadius:'50%',background:'var(--blue-l)',display:'inline-block'}}/>
            LIVE
          </span>
        </div>
        <div style={{padding:'10px 14px'}}>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <div style={{flex:1,background:'var(--green-bg)',borderRadius:8,padding:'10px',border:'1px solid rgba(16,185,129,.2)'}}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>Buy Volume</div>
              <div style={{fontSize:22,fontWeight:800,color:'var(--green)',fontFamily:'var(--mono)'}}>{bPct}%</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{(totB/1000).toFixed(0)}K units</div>
            </div>
            <div style={{flex:1,background:'var(--red-bg)',borderRadius:8,padding:'10px',border:'1px solid rgba(239,68,68,.2)'}}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>Sell Volume</div>
              <div style={{fontSize:22,fontWeight:800,color:'var(--red)',fontFamily:'var(--mono)'}}>{100-bPct}%</div>
              <div style={{fontSize:10,color:'var(--text3)'}}>{(totS/1000).toFixed(0)}K units</div>
            </div>
            <div style={{flex:1,background:'var(--bg3)',borderRadius:8,padding:'10px',border:'1px solid var(--border2)'}}>
              <div style={{fontSize:10,color:'var(--text3)',marginBottom:2}}>CVD Delta</div>
              <div style={{fontSize:18,fontWeight:800,color:lastCvd>0?'var(--green)':'var(--red)',fontFamily:'var(--mono)'}}>
                {lastCvd>0?'+':''}{Math.round(lastCvd/100)/10}K
              </div>
              <div style={{fontSize:10,color:lastCvd>0?'var(--green)':'var(--red)',fontWeight:600}}>
                {lastCvd>0?'Buying P.':'Selling P.'}
              </div>
            </div>
          </div>
          <div style={{fontSize:10,color:'var(--text3)',fontWeight:700,letterSpacing:.5,marginBottom:5}}>VOLUME DELTA · 20 BARS</div>
          <div style={{display:'flex',gap:2,height:55,alignItems:'flex-end'}}>
            {bars.map((b,i)=>{
              const tot=b.buy+b.sell,h=Math.round((tot/maxV)*51)+4;
              const bh=Math.round((b.buy/tot)*h);
              return(
                <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
                  <div style={{width:'100%',height:h-bh,background:'rgba(239,68,68,.55)',borderRadius:'2px 2px 0 0'}}/>
                  <div style={{width:'100%',height:bh,background:'rgba(16,185,129,.55)',borderRadius:'0 0 2px 2px'}}/>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      
      {/* CVD chart */}
      <div className="card">
        <div className="card-hdr"><span style={{fontWeight:700}}>📈 Cumulative Volume Delta (CVD)</span></div>
        <div style={{padding:'8px 14px'}}>
          <svg width="100%" height="48" viewBox={`0 0 200 48`} preserveAspectRatio="none">
            {(()=>{
              const mn=Math.min(...cvd),mx=Math.max(...cvd),range=mx-mn||1;
              const pts=cvd.map((v,i)=>`${(i/(cvd.length-1))*200},${44-((v-mn)/range)*40}`).join(' ');
              const col=lastCvd>0?'var(--green)':'var(--red)';
              return<>
                <polyline points={pts} fill="none" stroke={col} strokeWidth="1.5"/>
                <line x1="0" x2="200" y1={(44-((0-mn)/range)*40).toString()} y2={(44-((0-mn)/range)*40).toString()} stroke="rgba(255,255,255,.1)" strokeWidth="1"/>
              </>;
            })()}
          </svg>
        </div>
      </div>
      
      {/* Order blocks */}
      <div className="card">
        <div className="card-hdr"><span style={{fontWeight:700}}>🧱 Order Blocks & Imbalances</span></div>
        <div style={{padding:'4px 0'}}>
          {[
            {type:'Bullish OB', ok:true, tf:'4H', note:'Strong mitigation zone'},
            {type:'Bearish OB', ok:false,tf:'1D', note:'Unfilled resistance'},
            {type:'Fair Value Gap',ok:true,tf:'4H',note:'Below current price'},
            {type:'Inducement Zone',ok:true,tf:'1D',note:'Buy-side liquidity'},
          ].map((ob,i,arr)=>(
            <div key={i} style={{
              display:'flex',alignItems:'center',gap:10,padding:'8px 14px',
              borderBottom:i<arr.length-1?'1px solid var(--border)':'none'
            }}>
              <div style={{width:7,height:30,borderRadius:3,flexShrink:0,
                background:ob.ok?'var(--green)':'var(--red)'}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:12}}>{ob.type}</div>
                <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{ob.note}</div>
              </div>
              <span className={`tag ${ob.ok?'tag-g':'tag-r'}`}>{ob.ok?'Active':'Mitigated'}</span>
              <span style={{fontSize:10,color:'var(--text3)'}}>{ob.tf}</span>
            </div>
          ))}
        </div>
      </div>
      
      {/* Smart money */}
      <div className="card">
        <div className="card-hdr"><span style={{fontWeight:700}}>⚡ Smart Money Signals</span></div>
        <div style={{padding:'10px 14px',display:'flex',flexDirection:'column',gap:7}}>
          {[
            {l:'Liquidity Sweep',s:isBuyBias?'Below Lows':'Above Highs',c:isBuyBias?'var(--green)':'var(--red)'},
            {l:'Market Structure',s:isBuyBias?'BOS Bullish':'BOS Bearish',c:isBuyBias?'var(--green)':'var(--red)'},
            {l:'Institutional Bias',s:isBuyBias?'BUY (+2.3K)':'SELL (-1.8K)',c:isBuyBias?'var(--blue-l)':'var(--red)'},
            {l:'Stop Hunt Pattern',s:'No Signal',c:'var(--text3)'},
          ].map(({l,s,c})=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:12,color:'var(--text2)'}}>{l}</span>
              <span style={{fontSize:11,fontWeight:700,color:c}}>{s}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── ECONOMIC CALENDAR ─────────────────────────────────────────────────────
function EcoModal({pair, onClose, onLoad}) {
  const [filt, setFilt]       = useState('all');
  const [hidePast, setHidePast] = useState(false);
  const [events, setEvents]   = useState(ECO);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [lastFetch, setLastFetch] = useState('');

  // ── LIVE CALENDAR FETCH ──
  useEffect(() => {
    setLoading(true);

    function mapTD(items) {
      return items.map(e => {
        const dt = e.datetime ? new Date(e.datetime) : null;
        return {
          t:      dt ? dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'}) : '—',
          date:   dt ? dt.toISOString() : null,
          dateObj: dt,
          ccy:    e.currency || e.country || '—',
          imp:    e.importance==='High'||e.impact==='High' ? 'high'
                : e.importance==='Medium'||e.impact==='Medium' ? 'medium' : 'low',
          ev:     e.event || e.title || '—',
          prev:   e.previous !== undefined && e.previous !== null ? String(e.previous) : '—',
          fore:   e.estimate !== undefined && e.estimate !== null ? String(e.estimate)
                : e.forecast !== undefined ? String(e.forecast) : '—',
          actual: e.actual !== undefined && e.actual !== null && e.actual !== '' ? String(e.actual) : null,
          desc:   e.event + (e.currency ? ` (${e.currency})` : '') + `. ${e.importance||''} impact event.`
        };
      });
    }

    async function tryTwelveData() {
      if (!TD_API_KEY) return false;
      const today = new Date();
      const from  = today.toISOString().split('T')[0];
      const to    = new Date(today.getTime() + 7*864e5).toISOString().split('T')[0];
      const url   = `https://api.twelvedata.com/economic_calendar?start_date=${from}&end_date=${to}&apikey=${TD_API_KEY}`;
      const r = await fetch(url);
      const d = await r.json();
      if (d.result && Array.isArray(d.result.list)) {
        const mapped = mapTD(d.result.list);
        if (mapped.length > 0) {
          setEvents(mapped);
          if(onLoad) onLoad(mapped);
          setLastFetch(new Date().toLocaleTimeString() + ' · TD');
          return true;
        }
      }
      return false;
    }

    async function tryCorsproxy() {
      const proxies = [
        'https://corsproxy.io/?',
        'https://api.allorigins.win/raw?url=',
      ];
      const ffUrl = 'https://nfs.faireconomy.media/ff_calendar_thisweek.json';
      for (const proxy of proxies) {
        try {
          const r = await fetch(proxy + encodeURIComponent(ffUrl));
          const d = await r.json();
          if (Array.isArray(d) && d.length > 0) {
            const mapped = d.map(e => {
              const dt = e.date ? new Date(e.date) : null;
              return {
                t:      dt ? dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'}) : '—',
                date:   dt ? dt.toISOString() : null,
                dateObj: dt,
                ccy:    e.country || '—',
                imp:    e.impact==='High'?'high': e.impact==='Medium'?'medium':'low',
                ev:     e.title || '—',
                prev:   e.previous || '—',
                fore:   e.forecast || '—',
                actual: e.actual || null,
                desc:   `${e.title} — ${e.country} ${e.impact} impact event.`
              };
            });
            setEvents(mapped);
            if(onLoad) onLoad(mapped);
            setLastFetch(new Date().toLocaleTimeString() + ' · FF');
            return true;
          }
        } catch {}
      }
      return false;
    }

    (async () => {
      const ok = await tryTwelveData().catch(()=>false)
               || await tryCorsproxy().catch(()=>false);
      if (!ok) setLastFetch('');
      setLoading(false);
    })();
  }, []);

  const now = new Date();

  // Sort by date
  const sorted = [...events].sort((a,b) => {
    if (!a.dateObj && !b.dateObj) return 0;
    if (!a.dateObj) return 1;
    if (!b.dateObj) return -1;
    return a.dateObj - b.dateObj;
  });

  const filtered = sorted.filter(e => {
    if (filt !== 'all' && e.imp !== filt) return false;
    if (hidePast && e.dateObj && e.dateObj < now) return false;
    return true;
  });
  const highCount = events.filter(e => e.imp === 'high').length;
  const todayEvents = events.filter(e => e.dateObj && e.dateObj.toDateString()===now.toDateString());

  const impColor = imp => imp === 'high' ? '#ef4444' : imp === 'medium' ? '#f59e0b' : '#3b82f6';
  const impBg    = imp => imp === 'high' ? 'rgba(239,68,68,.12)' : imp === 'medium' ? 'rgba(245,158,11,.12)' : 'rgba(59,130,246,.12)';
  const isPast   = e => e.dateObj && e.dateObj < now;

  return (
    <div className="modal-bg" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal fi" style={{width:720, maxHeight:'85vh', display:'flex', flexDirection:'column'}}>

        {/* Header */}
        <div style={{padding:'14px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid var(--border)', flexShrink:0}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontWeight:800,fontSize:15}}>📅 Economic Calendar</span>
              {loading && <span style={{fontSize:10,color:'var(--text3)',animation:'pulse 1s infinite'}}>Loading...</span>}

function PairSearch({pair, onSelect}) {
  const [q, setQ] = React.useState('');
  const filtered = React.useMemo(() => {
    if (!q.trim()) return PAIR_GROUPS;
    const qUpper = q.toUpperCase();
    const result = {};
    Object.entries(PAIR_GROUPS).forEach(([grp, pairs]) => {
      const matches = pairs.filter(p => p.includes(qUpper));
      if (matches.length > 0) result[grp] = matches;
    });
    return result;
  }, [q]);

  return (
    <div style={{display:'flex',flexDirection:'column',maxHeight:'75vh'}}>
      <input
        autoFocus
        className="inp"
        placeholder="Search pair..."
        value={q}
        onChange={e=>setQ(e.target.value)}
        style={{fontSize:13,marginBottom:6}}
      />
      <div style={{overflowY:'auto',flex:1}}>
        {Object.entries(filtered).map(([grp, pairs]) => (
          <div key={grp}>
            <div style={{
              padding:'5px 10px 3px',
              fontSize:9,fontWeight:800,color:'var(--text3)',
              letterSpacing:1,background:'var(--bg1)',
              position:'sticky',top:0,zIndex:1,
              borderBottom:'1px solid var(--border)'
            }}>
              {grp.toUpperCase()}
            </div>
            {pairs.map(p => (
              <div key={p} onClick={()=>onSelect(p)}
                style={{
                  padding:'8px 12px',cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'space-between',
                  background:pair===p?'rgba(37,99,235,.15)':'transparent',
                  borderLeft:pair===p?'3px solid var(--blue-l)':'3px solid transparent',
                  fontSize:13,fontWeight:600,
                  color:pair===p?'var(--blue-l)':'var(--text2)',
                  transition:'background .1s',
                  borderBottom:'1px solid rgba(255,255,255,.03)'
                }}
                onMouseEnter={e=>e.currentTarget.style.background=pair===p?'rgba(37,99,235,.15)':'rgba(255,255,255,.04)'}
                onMouseLeave={e=>e.currentTarget.style.background=pair===p?'rgba(37,99,235,.15)':'transparent'}
              >
                <span>{p}</span>
                {pair===p && <span style={{fontSize:10,color:'var(--blue-l)'}}>●</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

function ApiKeyInput({onSave, onSkip, currentKey}) {
  const [key, setKey] = useState(currentKey || '');
  const [testing, setTesting] = useState(false);
  const [status, setStatus] = useState('');

  const testKey = async () => {
    if (!key.trim()) return;
    setTesting(true); setStatus('');
    try {
      const r = await fetch(`https://api.twelvedata.com/price?symbol=EUR/USD&apikey=${key.trim()}`);
      const d = await r.json();
      if (d.price) {
        setStatus('success');
      } else {
        setStatus('error: ' + (d.message || 'Invalid key'));
      }
    } catch {
      setStatus('error: network issue');
    }
    setTesting(false);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <div>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:6,fontWeight:600}}>TWELVE DATA API KEY</div>
        <input
          className="input"
          type="text"
          placeholder="Paste your API key here..."
          value={key}
          onChange={e=>setKey(e.target.value)}
          style={{fontSize:13,letterSpacing:.5}}
        />
        {status && (
          <div style={{marginTop:6,fontSize:11,fontWeight:600,
            color:status==='success'?'#10b981':'#ef4444',
            display:'flex',alignItems:'center',gap:5}}>
            {status==='success'?'✅ Key valid! EUR/USD price received':'❌ '+status}
          </div>
        )}
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={testKey} disabled={testing||!key.trim()} style={{
          flex:1,padding:'8px',borderRadius:8,border:'1px solid var(--border2)',
          background:'var(--bg3)',color:'var(--text2)',cursor:'pointer',
          fontFamily:'var(--font)',fontSize:12,fontWeight:600,
          opacity:testing||!key.trim()?0.5:1
        }}>{testing?'Testing...':'Test Key'}</button>
        <button onClick={()=>onSave(key.trim())} disabled={!key.trim()} style={{
          flex:2,padding:'8px',borderRadius:8,border:'none',
          background:key.trim()?'var(--blue)':'var(--bg4)',
          color:key.trim()?'#fff':'var(--text3)',
          cursor:key.trim()?'pointer':'not-allowed',
          fontFamily:'var(--font)',fontSize:12,fontWeight:700
        }}>Connect & Reload</button>
      </div>
      <button onClick={onSkip} style={{
        padding:'6px',borderRadius:8,border:'1px solid var(--border)',
        background:'transparent',color:'var(--text3)',cursor:'pointer',
        fontFamily:'var(--font)',fontSize:11
      }}>Skip — Use Simulation</button>
    </div>
  );
}

            ATHENA PRO
          </span>
        </div>
        
        {/* Strategy */}
        <div style={{position:'relative'}}>
          <button onClick={()=>setShowStratDrop(p=>!p)}
            style={{display:'flex',alignItems:'center',gap:5,background:'var(--bg3)',border:'1px solid var(--border2)',
              borderRadius:7,padding:'4px 10px',color:'var(--text)',cursor:'pointer',fontFamily:'var(--font)',fontSize:12,fontWeight:600}}>
            ↗ {strategy==='scalping'?'Scalping':'Swing Trading'} <span style={{fontSize:10,color:'var(--text3)'}}>▾</span>
          </button>
          {showStratDrop&&(
            <div style={{position:'absolute',top:'calc(100% + 5px)',left:0,background:'var(--bg2)',border:'1px solid var(--border2)',
              borderRadius:10,overflow:'hidden',zIndex:200,minWidth:190,boxShadow:'0 8px 32px rgba(0,0,0,.6)'}}>
              {[{id:'scalping',label:'Scalping',desc:'Quick trades · 30m–4H'},{id:'swing',label:'Swing Trading',desc:'Multi-day · 4H–1W'}].map(s=>(
                <div key={s.id} onClick={()=>{setStrategy(s.id);setTf(s.id==='scalping'?'5m':'4H');setShowStratDrop(false);setPredictions({});}}
                  style={{padding:'9px 14px',cursor:'pointer',
                    background:strategy===s.id?'var(--blue-glow)':'transparent',
                    borderLeft:strategy===s.id?'3px solid var(--blue-l)':'3px solid transparent'}}>
                  <div style={{fontWeight:700,fontSize:12}}>{s.label}</div>
                  <div style={{fontSize:10,color:'var(--text3)',marginTop:1}}>{s.desc}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        
        {/* Timeframes */}
        <div style={{display:'flex',gap:2,background:'var(--bg3)',padding:3,borderRadius:7,border:'1px solid var(--border)'}}>
          {(strategy==='scalping'?SCAL_TFS:SWING_TFS).map(t=>(
            <button key={t} onClick={()=>setTf(t)}
              style={{padding:'3px 9px',borderRadius:5,border:'none',cursor:'pointer',fontFamily:'var(--font)',
                fontSize:11,fontWeight:700,background:tf===t?'var(--blue)':'transparent',
                color:tf===t?'#fff':'var(--text3)',transition:'all .15s'}}>
              {t}
            </button>
          ))}
        </div>
        
        <div style={{flex:1}}/>
        
        {/* Overall score */}
        <div style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:7,padding:'3px 10px',textAlign:'center'}}>
          <div style={{fontSize:8,color:'var(--text3)',letterSpacing:.5}}>CONFLUENCE</div>
          <div style={{fontSize:13,fontWeight:800,color:confLabel(overallScore).c,fontFamily:'var(--mono)'}}>{overallScore}%</div>
        </div>
        
        {/* Pair selector */}
        <div style={{position:'relative'}}>
          <button onClick={()=>setShowPairDrop(p=>!p)}
            style={{display:'flex',alignItems:'center',gap:6,background:'var(--bg3)',border:'1px solid var(--border2)',
              borderRadius:7,padding:'4px 12px',color:'var(--text)',cursor:'pointer',fontFamily:'var(--font)',fontSize:13,fontWeight:700}}>
            🌐 {pair}
            <span style={{color:isUp?'#10b981':'#ef4444',fontSize:11,fontFamily:'var(--mono)',fontWeight:800}}>
              {livePrice.toFixed(dec)}
            </span>
            <span style={{color:isUp?'#10b981':'#ef4444',fontSize:10}}>
              {isUp?'▲':'▼'}{Math.abs(livePct).toFixed(2)}%
            </span>
            <span style={{fontSize:9,color:'var(--text3)'}}>▾</span>
          </button>
          {showPairDrop&&(
            <div style={{position:'absolute',top:'calc(100% + 5px)',right:0,background:'var(--bg2)',
              border:'1px solid var(--border2)',borderRadius:12,zIndex:300,width:230,
              boxShadow:'0 12px 40px rgba(0,0,0,.7)',marginTop:3,display:'flex',flexDirection:'column',
              maxHeight:'80vh'}}>
              {/* Search */}
              <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
                <PairSearch pair={pair} onSelect={(p)=>{setPair(p);setShowPairDrop(false);}}/>
              </div>
            </div>
          )}
        </div>
        
        <button onClick={()=>setShowEco(true)} className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}}>📅 CALENDAR</button>
        <button onClick={()=>setShowSettings(true)} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:15,padding:4}}>⚙</button>
        <button onClick={()=>document.documentElement.requestFullscreen?.()} style={{background:'none',border:'none',color:'var(--text3)',cursor:'pointer',fontSize:14,padding:4}}>⛶</button>
      </div>
      
      {/* ── MAIN CONTENT ── */}
      <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
        
        {/* Chart row */}
        <div style={{flex:'0 0 48%',display:'flex',flexDirection:'column',minHeight:0,overflow:'hidden',
          }}>
          {/* Chart view tab bar */}
          <div style={{height:32,flexShrink:0,display:'flex',alignItems:'center',
            background:'var(--bg1)',borderBottom:'1px solid var(--border)',gap:0}}>
            {[
              {id:'chart',     label:'📈 Chart'},
              {id:'orderflow', label:'⚡ Order Flow'},
              {id:'confluence',label:'🎯 Confluence'},
            ].map(v=>(
              <button key={v.id} onClick={()=>setChartView(v.id)} style={{
                padding:'4px 14px',border:'none',cursor:'pointer',fontFamily:'var(--font)',
                fontSize:11,fontWeight:700,height:'100%',
                background:chartView===v.id?'var(--bg2)':'transparent',
                color:chartView===v.id?'var(--text)':'var(--text3)',
                borderBottom:chartView===v.id?'2px solid var(--blue)':'2px solid transparent',
                transition:'all .15s'
              }}>{v.label}</button>
            ))}
          </div>
          {/* Chart view content */}
          <div style={{flex:1,display:'flex',minHeight:0,overflow:'hidden',flexDirection:isMobile?'column':'row'}}>
            <div style={{flex:1,position:'relative',borderRight:isMobile?'none':'1px solid var(--border)',overflow:'hidden',minHeight:isMobile?'220px':'auto'}}>
              {chartView==='chart' && (
                <AthenaChart key={pair+'_'+tf} pair={pair} tf={tf} chartSettings={chartSettings} livePrice={livePrice} tradeLines={tradeLines}/>
              )}
              {chartView==='orderflow' && (
                <OrderFlowChart candles={candles_snap} pair={pair} tf={tf} livePrice={livePrice}/>
              )}
              {chartView==='confluence' && (
                <ConfluenceView pair={pair} tf={tf} checks={checks[tf]||{}} allChecks={checks} strategy={strategy}/>
              )}
            </div>
            {!isMobile && (
              <div style={{width:295,flexShrink:0,overflow:'hidden'}}>
                <ChecklistPanel tf={tf} strategy={strategy} checks={checks[tf]||{}} onToggle={toggleItem}/>
              </div>
            )}
          </div>
        </div>
        
        {/* Bottom */}
        <div style={{flex:1,display:'flex',flexDirection:'column',minHeight:0,borderTop:'1px solid var(--border)'}}>
          <div style={{height:isMobile?44:36,flexShrink:0,display:'flex',alignItems:'center',gap:2,padding:'0 8px',
            background:'var(--bg1)',borderBottom:'1px solid var(--border)',overflowX:'auto'}}>
            {(isMobile
              ? [{id:'trade',label:'💼 Trade'},{id:'checklist',label:'✅ Checklist'},{id:'analysis',label:'📊 Analysis'},{id:'orderflow',label:'⚡ Flow'}]
              : [{id:'trade',label:'💼 Trade Setup'},{id:'analysis',label:'📊 Analysis'},{id:'orderflow',label:'⚡ Order Flow'}]
            ).map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                style={{padding:'3px 12px',borderRadius:6,border:'none',cursor:'pointer',fontFamily:'var(--font)',
                  fontSize:11,fontWeight:700,background:tab===t.id?'var(--blue)':'transparent',
                  color:tab===t.id?'#fff':'var(--text3)',transition:'all .15s'}}>
                {t.label}
              </button>
            ))}
            <div style={{flex:1}}/>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{utcStr}</span>
            {sessions.find(s=>s.active)&&(
              <span className="tag tag-g" style={{fontSize:9,marginLeft:6}}>
                {sessions.find(s=>s.active).name} · {fmtSecs(sessions.find(s=>s.active).remaining)}
              </span>
            )}
          </div>
          
          <div style={{flex:1,overflowY:'auto',padding:'10px 12px'}}>
            {tab==='trade'&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <TradeForm key={pair+'_'+tf+'_'+strategy} pair={pair} strategy={strategy} livePrice={livePrice} onTradeChange={setTradeLines} checks={checks[tf]||{}} tf={tf} savedPrediction={currentPred} onPredictionSave={setCurrentPred}/>
                <SessionsPanel sessions={sessions} clock={utcStr}/>
              </div>
            )}
            {tab==='checklist'&&isMobile&&(
            <ChecklistPanel tf={tf} strategy={strategy} checks={checks[tf]||{}} onToggle={toggleItem}/>
          )}
          {tab==='analysis'&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                <TFAnalysis checks={checks}/>
                <RiskPanel checks={checks[tf]||{}}/>
                <div className="card">
                  <div className="card-hdr"><span style={{fontWeight:700}}>🎯 Confluence Summary</span></div>
                  <div style={{padding:14,display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
                    <ConfGauge pct={overallScore} size={120}/>
                    <div style={{fontSize:11,color:'var(--text3)',textAlign:'center'}}>Multi-timeframe confluence across all active conditions</div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
                      {TFS.map((t,i)=>{
                        const c=tfScores[i];
                        const col=c>=60?'var(--green)':c>=30?'var(--gold)':'var(--red)';
                        return<div key={t} style={{textAlign:'center',padding:'4px 8px',background:'var(--bg3)',borderRadius:6}}>
                          <div style={{fontSize:9,color:'var(--text3)'}}>{t}</div>
                          <div style={{fontSize:13,fontWeight:700,color:col,fontFamily:'var(--mono)'}}>{c}%</div>
                        </div>;
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )}
            {tab==='orderflow'&&(
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <OrderFlowPanel pair={pair}/>
                <div className="card">
                  <div className="card-hdr"><span style={{fontWeight:700}}>📋 Order Flow Checklist</span></div>
                  <div style={{padding:'4px 0'}}>
                    {[
                      {l:'Buy Volume Dominance',ok:true},{l:'Positive CVD Trend',ok:true},
                      {l:'Order Block Mitigation',ok:false},{l:'Fair Value Gap',ok:true},
                      {l:'Liquidity Sweep Confirmed',ok:false},{l:'Institutional Order Block',ok:true},
                      {l:'Stop Hunt Pattern',ok:false},{l:'Market Structure Break',ok:true},
                    ].map(({l,ok})=>(
                      <div key={l} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 14px',borderBottom:'1px solid var(--border)'}}>
                        <span style={{fontSize:13}}>{ok?'✅':'⬜'}</span>
                        <span style={{fontSize:12,color:ok?'var(--text)':'var(--text3)',fontWeight:ok?600:400,flex:1}}>{l}</span>
                        <span style={{fontSize:11,color:ok?'var(--green)':'var(--text3)',fontWeight:700}}>{ok?'+5%':'—'}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
      
      {/* Modals */}
      {/* ── EVENT ALERT BANNER ── */}
      {eventAlert && (
        <div style={{
          position:'fixed', bottom:20, right:20, zIndex:600,
          background:'var(--bg2)', border:'2px solid #ef4444',
          borderRadius:14, padding:'14px 18px', maxWidth:340,
          boxShadow:'0 8px 32px rgba(239,68,68,.3)',
          animation:'fi .3s ease'
        }}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                <span style={{fontSize:18}}>⚠️</span>
                <span style={{fontSize:12,fontWeight:800,color:'#ef4444',letterSpacing:.5}}>HIGH IMPACT IN {eventAlert.minsAway} MIN</span>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:'var(--text)',marginBottom:4}}>{eventAlert.event.ev}</div>
              <div style={{display:'flex',gap:10,fontSize:11}}>
                <span style={{color:'var(--text3)'}}>🕐 {eventAlert.event.t} UTC</span>
                <span style={{
                  padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:700,
                  background:'rgba(239,68,68,.12)',color:'#ef4444'
                }}>{eventAlert.event.ccy}</span>
              </div>
              {(eventAlert.event.prev!=='—'||eventAlert.event.fore!=='—')&&(
                <div style={{display:'flex',gap:12,marginTop:8,fontSize:11}}>
                  <div><span style={{color:'var(--text3)'}}>Prev: </span><span style={{fontWeight:700,color:'var(--text2)',fontFamily:'var(--mono)'}}>{eventAlert.event.prev}</span></div>
                  <div><span style={{color:'var(--text3)'}}>Fore: </span><span style={{fontWeight:700,color:'var(--gold)',fontFamily:'var(--mono)'}}>{eventAlert.event.fore}</span></div>
                </div>
              )}
              <div style={{marginTop:10,padding:'6px 10px',borderRadius:7,
                background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.2)',
                fontSize:11,color:'#ef4444',fontWeight:600}}>
                ⚡ Consider closing positions or widening SL before this event
              </div>
            </div>
            <button onClick={()=>setEventAlert(null)} style={{
              background:'none',border:'none',color:'var(--text3)',fontSize:18,
              cursor:'pointer',padding:2,lineHeight:1,flexShrink:0
            }}>×</button>
          </div>
        </div>
      )}

      {showEco&&<EcoModal pair={pair} onClose={()=>setShowEco(false)} onLoad={onCalendarLoad}/>}
      {showSettings&&<SettingsModal settings={chartSettings} onSave={setChartSettings} onClose={()=>setShowSettings(false)}/>}
      
      {/* Close dropdowns */}
      {(showStratDrop||showPairDrop)&&(
        <div style={{position:'fixed',inset:0,zIndex:99}} onClick={()=>{setShowStratDrop(false);setShowPairDrop(false);}}/>
      )}

      {/* API KEY MODAL */}
      {showApiModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',
          justifyContent:'center',zIndex:500,backdropFilter:'blur(6px)'}}>
          <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:16,
            padding:28,width:420,maxWidth:'95vw',boxShadow:'0 20px 60px rgba(0,0,0,.6)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,var(--blue),#1e40af)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⊕</div>
              <div>
                <div style={{fontWeight:800,fontSize:16}}>ATHENA Pro · Live Data</div>
                <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>Connect to Twelve Data for real forex prices</div>
              </div>
            </div>

            <div style={{background:'var(--bg3)',borderRadius:10,padding:14,marginBottom:16,border:'1px solid var(--border)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text3)',letterSpacing:.5,marginBottom:8}}>HOW TO GET FREE API KEY</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.7}}>
                1. Πήγαινε στο <span style={{color:'var(--blue-l)',fontWeight:600}}>twelvedata.com</span><br/>
                2. Κάνε δωρεάν εγγραφή (Free tier)<br/>
                3. Dashboard → API Keys → Copy<br/>
                <span style={{color:'var(--green)',fontSize:11}}>✓ Free: 8 requests/min · Real forex + crypto prices</span>
              </div>
            </div>

            <ApiKeyInput onSave={(key)=>{
              TD_API_KEY=key;
              localStorage.setItem('athena_td_key',key);
              setShowApiModal(false);
              window.location.reload();
            }} onSkip={()=>setShowApiModal(false)} currentKey={TD_API_KEY}/>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
