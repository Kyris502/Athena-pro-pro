function pairDec(pair) {
const isJPY = pair.includes(‘JPY’);

function fmtSecs(s) {
const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=Math.floor(s%60);
return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}

function confLabel(p) {
if(p>=80) return {label:‘STRONG’,   c:’#3b82f6’};
if(p>=60) return {label:‘MODERATE’, c:’#3b82f6’};

if(p>=20) return {label:‘WEAK’,     c:’#f97316’};
return           {label:‘NONE’,     c:’#4a5570’};
}

function getSessionStatus() {
const now = new Date();
const h = now.getUTCHours() + now.getUTCMinutes()/60;
return SESSIONS.map(s => {
const act = s.e < s.s ? h >= s.s || h < s.e : h >= s.s && h < s.e;
const dur = s.e > s.s ? s.e - s.s : (24 - s.s) + s.e;
let rem = 0;
if (act) {
let en = s.e <= s.s ? s.e + 24 : s.e;
let ch = h < s.s ? h + 24 : h;
rem = Math.max(0, (en - ch) * 3600);
}
const prog = act && dur > 0 ? Math.min(100, 100 - (rem/(dur*3600))*100) : 0;
return {…s, act, rem, prog};
});
}

function isForexOpen() {
const now = new Date();
const day = now.getUTCDay();
const t = now.getUTCHours()*60 + now.getUTCMinutes();
if (day === 6) return false;
if (day === 0 && t < 22*60) return false;
if (day === 5 && t >= 22*60) return false;
return true;
}

function startSim() {
  const isCrypto = ['BTC/USD','ETH/USD','SOL/USD','XRP/USD','BNB/USD','ADA/USD','AVAX/USD','DOGE/USD'].includes(pair);
  if (!isCrypto && !isForexOpen()) { setSrc('CLOSED'); return; }
  setSrc('SIM');
  const tv = TICK_VOL[pair] || 0.0001;
  let p = base, drift = 0, dt = 0;
  refs.current.sim = setInterval(() => {
    if (!isCrypto && !isForexOpen()) {
      clearInterval(refs.current.sim); setSrc('CLOSED'); return;
    }
    dt++;
    if (dt > 8 + Math.floor(Math.random()*12)) { drift=(Math.random()-.5)*tv*2; dt=0; }
    const dev = (p-base)/base;
    p = parseFloat((p+(Math.random()-.5+drift-dev*0.08)*tv).toFixed(pairDec(pair)));
    refs.current.price = p;
    const ch = p - refs.current.open;
    setPrice(p);
    setChange(parseFloat(ch.toFixed(5)));
    setPct(parseFloat(((ch/refs.current.open)*100).toFixed(3)));
  }, 700);
}

function connectBinance() {
  const sym = pair.replace('/','').toLowerCase()+'usdt'.replace('usdusdt','usdt');
  const wsym = pair === 'BTC/USD' ? 'btcusdt' :
               pair === 'ETH/USD' ? 'ethusdt' :
               pair === 'SOL/USD' ? 'solusdt' :
               pair === 'BNB/USD' ? 'bnbusdt' : null;
  if (!wsym) { startSim(); return; }
  try {
    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${wsym}@ticker`);
    refs.current.ws = ws;
    ws.onopen = () => setSrc('BINANCE');
    ws.onmessage = e => {

      refs.current.open = parseFloat(d.o);
      setPrice(p); setChange(parseFloat(d.p)); setPct(parseFloat(d.P));
    };
    ws.onerror = () => startSim();
    ws.onclose = () => {};
  } catch { startSim(); }
}

function seededRand(seed) {
let s = seed | 0;
return () => { s = (s * 1664525 + 1013904223) | 0; return (s >>> 0) / 0xFFFFFFFF; };
}

function generateOrderFlowData(pair, tf) {
const base = BASE_PRICES[pair] || 1;
const volatMult = {‘1m’:0.06,‘3m’:0.12,‘5m’:0.18,‘15m’:0.28,‘30m’:0.42,‘45m’:0.52,‘1H’:0.7,‘2H’:1.0,‘4H’:1.5,‘1D’:3.2,‘1W’:6.5};

const vol = (baseVol[pair] || 0.001) * (volatMult[tf] || 1.0);
const seed = pair.split(’’).reduce((a,c)=>a+c.charCodeAt(0),0) * 31 + (SCAL_TFS.indexOf(tf)+1) * 7;
const rand = seededRand(seed);
const count = 60;
let price = base;
const bars = [];
let trendDir = rand()>0.5?1:-1, trendLen=0;

for (let i=0; i<count; i++) {
trendLen++;
if (trendLen > 5+Math.floor(rand()*10)) { trendDir=-trendDir; trendLen=0; }
const dev = (price-base)/base;
const mr = -dev*0.3*vol*5;
const body = (rand()*0.5+0.45)*vol;
const dir  = rand()<(0.5+trendDir*0.12)?1:-1;
const o = price;
const c = o + dir*body + mr;
const h = Math.max(o,c) + rand()*vol*0.25;
const l = Math.min(o,c) - rand()*vol*0.25;
price = c;

function getAOIZones(pair, tf, currentPrice) {
const base = currentPrice || BASE_PRICES[pair] || 1;
const isJPY  = pair.includes(‘JPY’);
const isBTC  = pair === ‘BTC/USD’;
const isGold = pair === ‘XAU/USD’;
const isIdx  = [‘US500’,‘NAS100’,‘GER40’,‘UK100’,‘JP225’,‘AUS200’,‘FRA40’].includes(pair);
const isCom  = [‘XAU/USD’,‘XAG/USD’,‘USOIL’,‘UKOIL’,‘NGAS’,‘COPPER’].includes(pair);
const dec    = isJPY||isBTC||isGold||isIdx ? 2 : 5;
const pip    = isJPY?0.01 : isBTC?1 : isGold?0.1 : isIdx?1 : 0.0001;

const scalp = SCAL_TFS.includes(tf);

// Scale distances relative to price
const d = (pct) => base * pct;

const defs = scalp ? [
// Scalp: 4 zones close to price
{src:‘4H’, top: d(0.004),  bot: d(0.0025), type:‘R’},
{src:‘4H’, top: d(0.002),  bot: d(0.0008), type:‘R’},
{src:‘4H’, top:-d(0.0008), bot:-d(0.002),  type:‘S’},
{src:‘4H’, top:-d(0.0025), bot:-d(0.004),  type:‘S’},
] : [
// Swing: full set
{src:‘1W’, top: d(0.025), bot: d(0.018), type:‘R’},
{src:‘1W’, top: d(0.015), bot: d(0.010), type:‘R’},
{src:‘1D’, top: d(0.010), bot: d(0.007), type:‘R’},
{src:‘4H’, top: d(0.005), bot: d(0.003), type:‘R’},
{src:‘4H’, top:-d(0.003), bot:-d(0.005), type:‘S’},
{src:‘1D’, top:-d(0.007), bot:-d(0.010), type:‘S’},
{src:‘1W’, top:-d(0.010), bot:-d(0.015), type:‘S’},
{src:‘1W’, top:-d(0.018), bot:-d(0.025), type:‘S’},
];

return defs.map((d2, i) => {
const topPrice  = parseFloat((base + d2.top).toFixed(dec));
const botPrice  = parseFloat((base + d2.bot).toFixed(dec));
const label     = (d2.src) + ‘.AOI’ + (i+1);
return {
label, src: d2.src, type: d2.type,
top:  Math.max(topPrice, botPrice),
bottom: Math.min(topPrice, botPrice),
style: AOI_COLORS[d2.src] || AOI_COLORS[‘4H’],
};
});
}

const dec = pairDec(pair);
const scalp = isScalp(tf);
const cfg = PIP_CFG[pair] || {pip:0.0001,pv:10};

useEffect(() => { if(onTradeChange) onTradeChange({entry,sl,tp,dir}); }, [entry,sl,tp,dir]);

const lots = useMemo(() => {
if(!bal||!rPct||!entry||!sl) return 0;
const ra = parseFloat(bal)*(parseFloat(rPct)/100);
const pips = Math.abs(parseFloat(entry)-parseFloat(sl))/cfg.pip;
return pips ? ra/(pips*cfg.pv) : 0;

if(!entry||!sl||!tp) return 0;
const r=Math.abs(parseFloat(entry)-parseFloat(sl));
const rew=Math.abs(parseFloat(tp)-parseFloat(entry));
return r ? rew/r : 0;

const riskUSD=(parseFloat(bal)||0)*(parseFloat(rPct)||0)/100;

const res = await fetch(‘https://api.anthropic.com/v1/messages’,{
method:‘POST’,headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:300,messages:[{role:‘user’,content:prompt}]})
});
const data = await res.json();
const text = data.content?.find(b=>b.type===‘text’)?.text||’’;
const p = JSON.parse(text.replace(/`json|`/g,’’).trim());
setDir(p.direction||dir);
setEntry(fmtP(p.entry||livePrice));
setSl(fmtP(p.sl));
setTp(fmtP(p.tp));

class ErrorBoundary extends React.Component {
constructor(props) { super(props); this.state = {error: null, info: null}; }
componentDidCatch(e, info) { this.setState({error: e, info}); }
render() {
if (this.state.error) {
return React.createElement(‘div’, {style:{padding:20,color:’#ef4444’,fontFamily:‘monospace’,fontSize:12,whiteSpace:‘pre-wrap’,background:’#0b0e1a’,height:‘100vh’,overflow:‘auto’}},
‘ATHENA ERROR:\n\n’ + (this.state.error?.message||‘Unknown’) + ‘\n\nStack:\n’ + (this.state.error?.stack||’’) + ‘\n\nComponent:\n’ + (this.state.info?.componentStack||’’)
);
}
return this.props.children;
}
}
if(window.__athenaReady) window.__athenaReady();
ReactDOM.createRoot(document.getElementById(‘root’)).render(
React.createElement(ErrorBoundary, null, React.createElement(App))
);
